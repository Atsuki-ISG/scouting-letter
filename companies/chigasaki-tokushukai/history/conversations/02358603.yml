  text: 茅ヶ崎徳洲会病院の採用担当の菅様この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。5月入職に向けて現在検討中です。急性期病棟やユニットでの実務対応はできると自負しております。夜勤専従で探しておりますが、夜勤多めまたは夜専の働き方の相談は可能でしょうか。お忙しいとは思いますがご検討、返答どうぞよろしくお願いいたします。内海悠子
