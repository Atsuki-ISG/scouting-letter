- date: '2026-04-11'
  label: スカウト
  role: company
  text: はじめまして！突然のご連絡大変失礼いたします、医療法人徳洲会 茅ヶ崎徳洲会病院の採用担当の菅でございます。この度は、ご経歴と茅ヶ崎を希望勤務地に入れられている点を拝見し、当院の『病棟看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。10年以上の臨床経験、特に外来での幅広い診療科でのご活躍に注目しました。多様な疾患に対応されてきた確かな実践力は、多くの診療科を持つ当院の医療に大きく貢献していただけると確信しています。また、心電図検定を取得されるなど、学び続ける姿勢も素晴らしいです。当院は、スタッフが安心して働けるよう、事前の「院内見学・説明会」を積極的に受け入れており、ご希望の方には入職後のミスマッチを防ぐための簡易的な業務体験の機会もご用意しています。＜募集要項概要＞📍勤務地茅ヶ崎駅(JR東海道本線)から徒歩5分、北茅ヶ崎駅(JR相模線)から車で10分📍仕事内容急性期もしくは地域包括ケア病棟における常勤(夜勤あり・2交代制)における看護業務全般。📍給与想定年収：420万円〜550万円程度。経験3年 / 正看護師の場合：年収 495 万円(月給 35.7 万円+賞与66.2万円)。📍特徴☆ボーナスは充実の「3ヶ月分」支給☆家族の医療費も病院が負担！「医療費減免制度」グループ病院での月々の保険診療費の自己負担が3,000円を超えた場合、超過分を病院が全額負担☆24時間託児所。0歳から10歳まで利用可能な託児所を完備！☆3歳になる前日まで時短勤務可能！📍勤務時間：日勤：8:30〜17:00（休憩60分）夜勤：16:30〜9:00（休憩90分）二交替制での勤務となります。月平均の残業時間は16〜20時間程度と少なめで、オンとオフの切り替えがしっかりできる環境です。救急搬送も1日6~7件程度と落ち着いてます。📍ご希望の働き方をご相談可能ご興味をお持ちいただけましたら、当院のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（まずは見学だけ、またはカジュアル面談からといったご希望も大歓迎です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。医療法人徳洲会　茅ヶ崎徳洲会病院採用担当　菅
- date: '2026-04-11'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。どうぞよろしくお願いいたします。
- date: '2026-04-11'
  label: 通常
  role: candidate
  text: すみません。応募ではありません。スカウトありがとうございます。とても嬉しく思いますが、2024年末に退職した大山です。大変お世話になりました。温かい御言葉もずっと忘れていません。一部の先輩との人間関係に悩んで休職したら、子どもが小学校でいじめられて毎日泣いて帰宅していて、またスポーツを始めて送迎が忙しくて仕事を続けられなくなり、退職いたしました。現在は夜勤専従で一般急性期で派遣で働いております。茅ヶ崎徳洲会での勤務を今思うと、楽しかった思い出が甦ります。今は50人を看護師２人でみていて毎回12時頃までサービス残業しているので、茅ヶ崎徳洲会がとても働きやすかったことを思い出します。心電図検定だけでなく、急性期ケア専門士などの検定も挑戦しているところです。今は今の環境でスキルアップして、またいつかご縁がありましたらよろしくお願いいたします。
- date: '2026-04-16'
  label: 通常
  role: company
  text: 大山様、ご丁寧にご連絡をいただきありがとうございます。大山様は泌尿器科中心の病棟で勉強熱心に働かれていたと伺っております。大山様のような方と巡り会えて大変光栄に思っております。また一緒に働けることを心待ちにしております。同じ業界ですので引き続きよろしくお願いいたします。
