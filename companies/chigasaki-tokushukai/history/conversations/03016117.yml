  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。応募に際しまして、以下の点について質問させていただきたいと存じます。【質問内容】現在、病棟勤務中、予定では初夏頃に退職予定です。家庭との両立を考え、日勤週４日の勤務ができるところを探しておりますが、募集条件に合いますでしょうか？お忙しいところ恐れ入りますが、ご確認のほど何卒よろしくお願いいたします。
