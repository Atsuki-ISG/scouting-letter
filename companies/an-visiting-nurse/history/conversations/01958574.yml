- date: '2025-12-07'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、an訪問看護ステーションの梶山と申します。この度は、ご経歴を拝見し、an訪問看護ステーションの『作業療法士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。埼玉県の方だとは理解しているのですが、作業療法士として10年以上ご活躍され、その専門性を深めてこられた点に感銘を受け、もしかしたらと思いお声がけさせていただいております。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると確信しております。現在、an訪問看護ステーションでは、横浜市南区でご勤務いただける作業療法士を募集しております。訪問範囲は、南区全域、磯子区、中区、保土ヶ谷区、西区、港南区の一部でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容：利用者様のご自宅へ訪問し、リハビリテーションを実施していただきます。◯作業療法士業務全般・地域の方々への訪問リハビリ業務・報告書、計画書作成・ベッド上でのリハビリ、屋外歩行等・会社業務（チームの仕事）※訪問手段：軽自動車、電動自転車※訪問エリア：横浜市/南区、西区、磯子区内※訪問件数：約4～6件/日給与： 月給 281,500円 〜 380,000円*想定年収：495万円〜650万円（賞与年2回分を含む）*2年目以降：520万円〜特徴：お客様だけでなく、働くスタッフも大切にしています。・訪問看護の経験不問！ブランクある方も大歓迎◎・年間休日124日以上！完全週休2日制を採用・9〜17時の7時間勤務！残業ほぼなし◎・弘明寺駅徒歩3分！通勤にも便利な事業所・時短勤務の相談可！WワークOK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）定休日：土日祝教育体制・研修・社内研修制度あり・資格取得支援制度あり勤務地：an 訪問看護ステーション〒232-0061 神奈川県横浜市南区大岡2丁目7-15-101ご興味をお持ちいただけましたら、当訪問看護ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
- date: '2025-12-07'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきましてありがとうございます。横浜の事業所様からとかなり遠方なので驚きはあります。なので、私の今回の転職活動を行うきっかけを先にお伝えしたほうが良いかと思います。転職を決意したきっかけですが、現職場の残業時間の常習化と休憩時間が20～30分と短いことに対して改善がないこと、働きやすさに対して軽視している会社風土や今年から私の妻の独立開業と重なり、出来るだけ子育ての協力や年老いてきた親の協力などあり、出来るだけ休みが取りやすい環境へ変えながら自身も負担のないよう、ワークライフバランスを重視しつつ、家族を養う立場として転職活動を行っています。この度、自身の経歴に興味を持って下さり、スカウトをして頂いたことは、大変ありがたいことではあります。質問ですが、時短勤務の詳細や働き方の重視など具体的にはどのように行われているのでしょうか？かなり遠方の従業員に対して例えのイメージが湧かないのが現状ではあります。お忙しい中、申し訳ございませんが、教えて頂けたらと思います。宜しくお願い致します。
- date: '2025-12-12'
  label: 通常
  role: company
  text: ご返信が遅くなり、大変申し訳ございません。遠方の従業員がいないものですから、すり合わせをしながら、お互い長く働けるよう配慮・工夫をしていきたいと考えていました。引越しも前提として、スカウトメールを送っておりましたので、難しいようでしたら、現職を続けられる方が西村様にとっていい選択かもしれませんね。
- date: '2025-12-12'
  label: 通常
  role: candidate
  text: 返信ありがとうございます。申し訳ございませんが、引っ越しは考えていません。擦り合わせることは難しいので、今回のスカウトは辞退させて頂きます。宜しくお願い致します。
