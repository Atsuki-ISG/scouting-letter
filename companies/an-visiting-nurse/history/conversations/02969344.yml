  text: はじめまして。突然のご連絡大変失礼いたします、an訪問看護ステーションの梶山と申します。この度は、ご経歴を拝見し、an訪問看護ステーションの『訪問看護師（正社員）』のキャリアをご検討いただきたく、ご連絡いたしました。看護師を10年以上ご経験され、その専門性を深めてこられた点に感銘を受けました。南区在住で自動車運転免許があられるのもピッタリだと思いました。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけるのではないかと感じます。現在、an訪問看護ステーションでは、横浜市南区でご勤務いただける看護師を募集しております。訪問範囲は、南区全域、磯子区、中区、保土ヶ谷区、西区、港南区の一部でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境をお約束します。＜募集要項概要＞仕事内容利用者様に応じた、必要な看護を提供していただきます。・バイタル測定や服薬管理・療養相談、医療的処置・ターミナルケアや精神障害や認知症ケア・入浴介助などの日常支援給与： 月給33.2万円〜特徴：お客様だけでなく、働くスタッフも大切にしています。・訪問看護の経験不問！ブランクある方も大歓迎◎・年間休日124日以上！完全週休2日制を採用・9〜17時の7時間勤務！残業ほぼなし◎・弘明寺駅徒歩3分！通勤にも便利な事業所・時短勤務の相談可！WワークOK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）定休日：土日祝教育体制・研修・社内研修制度あり・資格取得支援制度あり勤務地：an訪問看護ステーション神奈川県横浜市南区大岡2丁目7-15-101ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
