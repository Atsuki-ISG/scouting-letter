  text: 豊村 亜希子 様お世話になっております。この度はお忙しい中、スカウトメールにご返信いただき誠にありがとうございます。豊村様のこれまでのご実績を拝見し、是非一度お話ししたいと強く願っておりましたので、こうして前向きなお返事をいただけて大変嬉しく思っております。ご記載いただいた「週1日〜のダブルワーク」としての関わり方につきましても、前向きに検討ができます。私共としては、まずは豊村様のお力添えをいただける可能性を模索したいと考えております。当日の面談では、弊社のビジョンや業務内容はもちろんですが、豊村様が今後どのようなキャリアや働き方を大切にされたいかについても、ぜひ詳しくお聞かせください。つきましては、下記の日程よりお時間をご調整いただくことは可能でしょうか。4月21日 (火) 18時〜4月22日 (水) 17時以降4月25日 (土) 15時〜また、オンラインと対面どちらでも面談が可能ですが、豊村様にご対応いただきやすい方法はどちらになりますでしょうか。お忙しい中恐縮ですが、ご検討いただけますと幸いです。豊村様とお話しできるのを、心より楽しみにしております。どうぞよろしくお願いいたします。
