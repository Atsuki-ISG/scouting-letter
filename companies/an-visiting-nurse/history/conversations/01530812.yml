  text: 石塚様お世話になっております。インラインで失礼いたします。･週4勤務は可能でしょうか。→週4勤務は可能でございます。･ご利用者様100名に対して従業員の方が少ないように見受けられましたが、どのようなスケジュールで業務をされていらっしゃるのでしょうか。→現在、看護師7名、利用者は150名ほどです。看護師一人当たり21名の受け持ちなので、従業員が少ないというわけではないと思っています。･100名の中でリハビリを必要とされている方はどのくらいいらっしゃるでしょうか。→リハが入っている利用者は、54名でございます。･1日4～6件という事でしたが、1訪問につき2単位(40分)又は3単位(60分)でしょうか。→基本的には2単位ですが、3単位入っている方が2名ほどおります。･報告書、計画書、その他の書類業務もありますが、時間内に終わるように訪問件数も設定されていらっしゃるのでしょうか。→報告書、計画書については、多少残業していただいています。面接ではなく、面談という形でざっくばらんにお話をすることも可能でございます。*面談は、オンライン・対面、石塚様のご都合のいい方法で対応可石塚様がよろしければ、ご都合のいい日程をいくつか頂戴できますと幸いです。引き続き、どうぞよろしくお願いいたします。
