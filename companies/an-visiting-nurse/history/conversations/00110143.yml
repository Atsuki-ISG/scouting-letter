  text: はじめまして。神奈川県横浜市南区 an訪問看護ステーションの採用担当の梶山と申します。プロフィールを拝見して、ぜひ直接会ってお話したいと思いスカウトをお送りさせていただきました。現在、an訪問看護ステーションでは作業療法士としてご活躍いただける方を募集しています。もしよろしければ見学を兼ねて面接にお越しいただけませんか？【募集内容】募集職種    作業療法士正職員　月給281,500円〜住所　神奈川県横浜市南区大岡2-7-15  101アクセス　ブルーライン 弘明寺駅から徒歩で3分京急本線 弘明寺駅から徒歩で10分ブルーライン 蒔田駅から徒歩で17分特徴　ブランク可、駅近(5分以内)、社会保険完備、車通勤可、土日祝休み、週休2日、育児支援あり、残業ほぼなし、年間休日120日以上、ボーナス・賞与あり、年齢不問、退職金あり、訪問リハビリ、副業OK、学歴不問、残業月20時間以内、訪問看護ステーション少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
