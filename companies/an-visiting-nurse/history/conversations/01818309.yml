  text: 🌸相談支援専門員募集🌸年間休日124日以上！完全週休2日制！9〜17時勤務！時短相談可！横浜市南区の訪問看護ステーションはじめまして。突然のご連絡大変失礼いたします、an訪問看護ステーションの梶山と申します。この度は、ご経歴を拝見し、an訪問看護ステーションの'相談支援専門員'のキャリアをご検討いただきたく、ご連絡いたしました。15年以上にわたる介護現場での確かな実践力に注目いたしました。長年培われた観察力やコミュニケーション力は、当ステーションでの利用者様へのヒアリングや計画作成において大いに活かしていただけると期待しております。これまでのご経験は、地域に根差した当ステーションが目指す「地域の皆様に寄り添う支援」において、重要な役割を担っていただけると感じております。現在、an訪問看護ステーションでは、相談支援業務をお任せできる相談支援専門員を募集しております。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容：・利用者家族より支援要望のヒアリング・利用計画の作成・支援サービス業者の紹介、連絡調整・定期的なモニタリングの実施・担当者会議への出席・実施※相談件数：1日3件程度給与： 時給 1,400円 〜 1,500円特徴：お客様だけでなく、働くスタッフも大切にしています。・ブランクOK！年齢不問◎・年間休日124日以上！完全週休2日制を採用・9〜17時勤務！時短相談可◎・弘明寺駅徒歩3分！通勤にも便利な事業所・副業OK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）*時短勤務相談可定休日：土日祝勤務地：an 訪問看護ステーション〒232-0061 神奈川県横浜市南区大岡2丁目7-15-101ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。(オンライン面談可)ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
