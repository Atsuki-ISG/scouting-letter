  text: 何度もご連絡してしまい、申し訳ございません。諦めきれずのご連絡大変失礼いたします、an訪問看護ステーションの梶山と申します。この度は、ご経歴を拝見し、an訪問看護ステーションの『作業療法士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。作業療法士として1年以上ご活躍され、その専門性を深めてこられた点に感銘を受けました。英語教師をされていたご経験があられる点もとても素敵だと感じます。そのご経験と価値観は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」にいて、重要な役割を担っていただけると感じております。現在、an訪問看護ステーションでは、横浜市南区でご勤務いただける作業療法士を募集しております。訪問範囲は、南区全域、磯子区、中区、保土ヶ谷区、西区、港南区の一部でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容：利用者様のご自宅へ訪問し、リハビリテーションを実施していただきます。◯作業療法士業務全般・地域の方々への訪問リハビリ業務・報告書、計画書作成・ベッド上でのリハビリ、屋外歩行等・会社業務（チームの仕事）※訪問手段：軽自動車、電動自転車※訪問エリア：横浜市/南区、西区、磯子区内※訪問件数：約4～6件/日給与： 月給 281,500円 〜 380,000円*想定年収：495万円〜650万円（賞与年2回分を含む）*2年目以降：520万円〜特徴：お客様だけでなく、働くスタッフも大切にしています。・訪問看護の経験不問！ブランクある方も大歓迎◎・年間休日124日以上！完全週休2日制を採用・9〜17時の7時間勤務！残業ほぼなし◎・弘明寺駅徒歩3分！通勤にも便利な事業所・時短勤務の相談可！WワークOK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）定休日：土日祝教育体制・研修・社内研修制度あり・資格取得支援制度あり勤務地：an 訪問看護ステーション〒232-0061 神奈川県横浜市南区大岡2丁目7-15-101ご興味をお持ちいただけましたら、当訪問看護ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。(オンライン面談可)ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
- date: '2026-01-07'
  label: 応募
  role: candidate
  text: 梶山様この度はご丁寧で温かいご連絡をいただき、誠にありがとうございます。数あるスカウトの中でも、私の経歴や価値観をしっかりとご覧いただいたうえでお声がけくださったことが文章から伝わり、定型的なご連絡とは異なるお気持ちを感じたため、ぜひお返事を差し上げたいと思いご連絡いたしました。大変魅力的なお話ではございましたが、現在は今後のキャリアとして小児分野を主軸に専門性を深めていきたいという思いが強く、誠に勝手ながら今回はご期待に添うことが難しいのが現状です。せっかく想いを込めてお声がけいただいたにもかかわらず、このようなお返事となり申し訳ございません。an訪問看護ステーション様の理念やお考えには強く共感しておりますので、今後のご発展と皆様のご活躍を心よりお祈り申し上げます。この度は誠にありがとうございました。
- date: '2026-01-08'
  label: 通常
  role: company
  text: 當間 歩. 様an訪問看護ステーションの梶山です。 お忙しい中、非常に丁寧で温かいお返事をいただき、誠にありがとうございます。私のメッセージから意図を汲み取ってくださり、こうして心の内をお聞かせいただけたこと、大変嬉しく、また身の引き締まる思いです。小児分野を主軸に専門性を深めていきたいという當間様の明確なビジョン、素晴らしいですね。その分野で力を発揮されることは、多くの子供たちやご家族にとって大きな支えになることと思います。今回はご縁を繋ぐことが叶いませんでしたが、當間様の志すキャリアが実り多きものとなりますよう、心より応援しております。またいつかどこかで、別の形でもお力になれることがあれば幸いです。 この度は、誠にありがとうございました。
