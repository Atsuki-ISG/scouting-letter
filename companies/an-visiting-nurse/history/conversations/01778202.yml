  text: お世話になっております。梶山です。先日はお忙しい中面接にお越しいただき、誠にありがとうございました。このたびは、当社求人にご応募いただき、面接にお越しいただきありがとうございました。慎重に選考を進めた結果、鵜沢様を採用させていただくこととなりましたのでご連絡申し上げます。入社日につきましては、11月15日（月）を予定しております。初出勤日は１１月１７日といたします。出勤時までにご準備いただきたいことについて、ご連絡したいので  todouvtns@gmail.com　にご連絡いただけますでしょうか。今後ともどうぞよろしくお願いいたします。ご不明な点がございましたらお気軽にご連絡ください。どうぞよろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
