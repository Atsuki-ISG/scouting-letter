  text: お世話になっております、鵜沢です。先日は内定の通知をいただき、誠にありがとうございました。このようなありがたいお話をいただきながら恐縮ですが、内定を辞退させていただきたくご連絡いたしました。1ヶ月ほど無職の状態が続いていたため重複して就職活動をしておりました。そのため、先に内定をいただいた事業所に入職をすることになりました。梶山様をはじめとして採用に関わったみなさまには、貴重なお時間を割いていただき感謝しております。また、本来ならお電話で直接お伝えすべきところ、このような形でのご連絡となってしまい申し訳ありません。末筆ながら、貴社の益々の発展を心よりお祈り申し上げます。
