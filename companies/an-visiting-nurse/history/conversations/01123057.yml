  text: 🌸相談支援専門員募集🌸年間休日124日以上！完全週休2日制！9〜17時勤務！時短相談可！横浜市南区の訪問看護ステーションはじめまして。夜分に突然のご連絡大変失礼いたします。4年にわたる児童発達支援管理責任者の経験に加え、相談支援の実務にも携わってこられたご経歴に非常に強く惹かれ、ご連絡いたしました。多彩なご経験を土台に、一人ひとりに寄り添われてきた01123057様のような方に、ぜひ弊社の中心となってご活躍いただきたいと考えております。これまでのご経験は、地域に根差した当ステーションが目指す「地域の皆様に寄り添う支援」において、重要な役割を担っていただけると感じております。現在、an訪問看護ステーションでは、相談支援業務をお任せできる相談支援専門員を募集しております。今回はパートタイマーとしての募集ではございますが、ご本人のご希望やライフスタイルに合わせて、将来的に正社員へと登用させていただく制度も整っております。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容：・利用者家族より支援要望のヒアリング・利用計画の作成・支援サービス業者の紹介、連絡調整・定期的なモニタリングの実施・担当者会議への出席・実施※相談件数：1日3件程度給与： 時給 1,400円 〜 1,500円特徴：お客様だけでなく、働くスタッフも大切にしています。・ブランクOK！年齢不問◎・年間休日124日以上！完全週休2日制を採用・9〜17時勤務！時短相談可◎・弘明寺駅徒歩3分！通勤にも便利な事業所・副業OK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）*時短勤務相談可定休日：土日祝勤務地：an 訪問看護ステーション〒232-0061 神奈川県横浜市南区大岡2丁目7-15-101当ステーションのより詳しい情報や、働き方のご希望についてなど、まずは情報交換だけでも結構ですので、一度お話しする機会をいただけないでしょうか。(オンライン可)ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
