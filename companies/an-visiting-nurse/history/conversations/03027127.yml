  text: an訪問看護ステーション梶山 敬生 様はじめまして。この度はご丁寧なご連絡をいただき、ありがとうございます。（「諦めきれず」という一文に、思わずクスッとしてしまいました☺️）私の経歴をご覧いただき、また温かいお言葉を添えていただき、とても嬉しく思っております。訪問看護ステーションとして大切にされている想いや、働き方への配慮が伝わり、ぜひ一度お話を伺ってみたいと感じました。現在は情報収集も兼ねての段階ではありますが、「面白そう！」という率直な気持ちに惹かれ、スカウト応募をさせていただきました（笑）ぜひ貴社の現場のお話などを伺えましたら幸いです。日程等につきましても、ご相談させていただけませんか？どうぞよろしくお願いいたします。畑中 沙希
