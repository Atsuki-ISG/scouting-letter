  text: この度はスカウトをいただきましてありがとうございます。作業療法士の松尾と申します。現在、同じような条件でパートをしております。事業所が閉鎖になるとの事で、別事業所に行くか悩んでいた所でした。現状は、火・水・木で9:00〜18:00で勤務しております。まだ相談の段階で申し訳ありませんが、条件等のご確認をさせて頂けると嬉しいです。よろしくお願い致します。
