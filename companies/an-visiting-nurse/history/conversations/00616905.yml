- date: '2025-10-19'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、an訪問看護ステーションの梶山と申します。この度は、ご経歴を拝見し、an訪問看護ステーションの『作業療法士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。作業療法士として10年以上ご経験され、その専門性を深めてこられた点に感銘を受けました。そのご経験と価値観は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると確信しております。現在、an訪問看護ステーションでは、横浜市南区でご勤務いただける作業療法士を募集しております。訪問範囲は、南区全域、磯子区、中区、保土ヶ谷区、西区、港南区の一部でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容：利用者様のご自宅にお伺いし、一人ひとりのニーズに合わせたリハビリテーションを実施していただきます。給与： 月給 281,500円 〜 *想定年収495万円〜特徴：お客様だけでなく、働くスタッフも大切にしています。・訪問看護の経験不問！ブランクある方も大歓迎◎・年間休日124日以上！完全週休2日制を採用・9〜17時の7時間勤務！残業ほぼなし◎・弘明寺駅徒歩3分！通勤にも便利な事業所・時短勤務の相談可！WワークOK勤務時間と定休日：勤務時間：9時00分～17時00分（休憩60分）定休日：土日祝教育体制・研修・社内研修制度あり・資格取得支援制度あり勤務地：an 訪問看護ステーション〒232-0061 神奈川県横浜市南区大岡2丁目7-15-101ご興味をお持ちいただけましたら、当訪問看護ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談は、オンラインを想定しています。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。an訪問看護ステーション　梶山敬生
