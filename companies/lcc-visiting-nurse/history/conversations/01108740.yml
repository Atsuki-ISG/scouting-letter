  text: 駒井 恵 様お世話になっております。LCC訪問看護ステーションの採用担当でございます。この度は、ご返信いただき、誠にありがとうございます。オンラインもしくは対面にて相互理解を目的とした面談及び、キャリアのご提案をさせていただきたく存じます。お手数ですが、下記のURLよりご希望の日程をお選びいただくことは可能でしょうか。日程調整はこちら▼https://timerex.net/s/lcc/f7132cf4また、会社名の欄に "オンライン" or "対面" どちらの面談方法がご希望かも、併せてご回答いただけますと幸いです。初回から選考希望の方に関しましては、会社名の欄に対面（応募）とご記載ください。お忙しい中恐縮ですが、ご対応いただけますと幸いです。何卒よろしくお願い申し上げます。
