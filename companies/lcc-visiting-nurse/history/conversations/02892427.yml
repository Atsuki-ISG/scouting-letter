  text: 小林様ご連絡ありがとうございます。他の職場への入職を決められたとのこと、承知いたしました。弊社としては大変残念ではございますが、小林様の今後のご活躍を心よりお祈り申し上げます。またご縁があった際には、ぜひお問い合わせください。今回は弊社にご興味をお持ちいただき、まことにありがとうございました。ライフ・ケア・コンシェルジュ（株）水田
