- date: '2025-09-26'
  label: スカウト
  role: company
  text: はじめまして。LCC訪問看護ステーションの採用担当です。弊所は東京都の港区、渋谷区・千代田区を中心に「『生きる』を楽しむ」をテーマに、利用者様の暮らしに寄り添うケアの提案・提供に心がけています。プロフィールを拝見してスカウトをお送りさせていただきました。現在、拠点の拡充などもあり私たちと一緒に成長を楽しめる方を募集しています。【募集内容】募集職種    言語聴覚士正職員　月給295,000円〜478,800円住所　東京都港区西麻布1-14-2 疋田ビル2Fアクセス　東京メトロ千代田線 乃木坂駅から徒歩で8分東京メトロ日比谷線 六本木駅から徒歩で10分特徴　訪問看護ステーション、社会保険完備、週休2日、残業ほぼなし、年間休日120日以上、交通費支給、研修制度あり、年収400万円以上可能、脳血管リハビリ、難病リハビリ、小児リハビリ、年収500万円以上可能、副業OK、即日勤務OK、40代活躍、50代活躍、WEB面接可、残業月20時間以内少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
- date: '2026-01-12'
  label: スカウト
  role: company
  text: 諦めきれず、再三のご連絡となり、大変申し訳ございせん。LCC訪問看護ステーションの採用担当でございます。この度は、ご経歴を拝見し、LCC訪問看護ステーションの『言語聴覚士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。言語聴覚士として10年以上ご経験され、その専門性を深めてこられた点に感銘を受けました。そのご経験は、地域に根差した当ステーションが目指す「誰もが自分らしく生きられる社会の実現」において、重要な役割を担っていただけると感じております。現在、LCC訪問看護ステーションでは、東京23区内でご勤務いただける言語聴覚士の方を募集しております。訪問範囲は、港区、渋谷区、千代田区中心で、一部世田谷区、品川区、中央区、文京区もございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境をお約束いたします。＜募集要項概要＞仕事内容 訪問看護ステーションでのリハビリ業務・バイタルチェックや健康状態の観察・日常生活の支援・高次脳機能障害に対するリハビリ・身体機能低下のご利用者様に対するリハビリ、歩行練習・医療保険、介護保険に該当しないリハビリ・計画書や報告書の作成・ご利用者様宅の担当者会議や地域会議参加給与： 月給 295,000円 〜 478,800円特徴：・完全週休二日制！年末年始休暇など、年間休日120日・残業ほぼなし！ワークライフバランスを重視・産休・育休・有給の取得がしやすい環境◎・在宅医療を学ぶことができ、成長・スキルアップ可能・社内メンター制度あり！充実した教育体制・同行訪問1ヶ月！訪問が初めての方でも大丈夫・Wワーク・副業OK！一人ひとりに合わせた柔軟な働き方◎・マネジメント未経験歓迎！育成・仕組みづくりを学べる環境あり・20代〜50代まで幅広い世代が活躍！ブランクOK・チームワーク重視！相談しやすい良好な人間関係あり・子育て中の方や大学院に通いながら勤務することも可能勤務時間：・9:00～18:00（休憩60分）*残業ほぼなし福利厚生：・各種社会保険完備・研修制度（社内メンター制度）あり*訪問看護が初めての方でもご安心ください。・自転車・制服の貸与あり・携帯電話・ipadの貸与あり・社員表彰式あり所在地： 本社：東京都港区西麻布1-14-2 疋田ビル2F北里研究所病院サテライト：東京都港区白金5-9-1 学校法人北里研究所 職員宿舎棟120号室渋谷サテライト：東京都渋谷区上原1-38-11 シャトー代々木上原204三楽病院サテライト：東京都千代田区神田駿河台2－5 ＼インスタグラムで社員や職場の情報を発信中／@lifecareconciergeとインスタグラムで検索し、フォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインを想定しています。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。LCC訪問看護ステーション　採用担当
