  text: 小林様こちらこそ先日はありがとうございました。ぜひ一度お越しください。ただご存知の通り訪問看護ステーションになりますのでいわゆる事務所です。従いまして、私や三枝以外とも少しコミュニケーションをとってもらえると雰囲気を感じてもらえるのではないかと考えております。とは言え、いただいたスケジュール次第で会っていただけるメンバーも変わってくるかと思いますので、来社可能な日時をいくつかお知らせいただければ、調整させたいただきます。よろしくお願いいたします。ライフ・ケア・コンシェルジュ（株）水田
