  text: 【面談確約】月給最大47.9万／年休120日／残業なし◎未経験から始める訪問リハビリ！はじめまして！LCC訪問看護ステーションの採用担当です。ご経歴を拝見し、リハビリの臨床経験と専門性が、当施設の目指すケアと非常にマッチしていると感じ、スカウトをお送りしました！プロフィールを拝見し、理学療法士として10年以上のリハビリの臨床経験をお持ちである点にとても魅力を感じました。豊富な経験で培われた専門スキルは、脳血管から小児まで幅広い疾患に対応する当ステーションにおいて、大きな力になると考えています。これまでの素晴らしいご経験は、地域に根ざした当ステーションが目指す「誰もが自分らしく生きられる社会の実現」において、重要な役割を担っていただけると思っております。私たちは港区・渋谷区・千代田区を中心に訪問看護・リハビリを行っています。看護師に加えPT・OT・STが多数在籍し、多職種連携のもと幅広いニーズに対応しています。「訪問リハビリは初めて…」という方もご安心ください！＼ LCCで働く3つのメリット ／① 自分の時間を大切にできる働き方・完全週休2日制＆年間休日120日！・残業ほぼなし（月20時間以内）・週3日勤務から常勤選択が可能◎② 未経験でも安心のサポート体制・「東京都訪問看護教育ステーション」事業を受託する高い教育力！・入社後約1ヶ月は先輩が同行訪問③ 充実の待遇・月給：29.5万円 ～ 47.9万円・入社祝い金3万円／副業もOK！まずは「オンラインでのカジュアル面談」で、ざっくばらんにお話ししてみませんか？履歴書は不要です。「とりあえず職場の雰囲気だけ知りたい」という方も大歓迎です！ご返信を、心よりお待ちしております。LCC訪問看護ステーション 採用担当
