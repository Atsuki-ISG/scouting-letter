  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。どうぞよろしくお願いいたします。
- date: '2025-12-11'
  label: 通常
  role: company
  text: 佐藤 美優　様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。ぜひ一度面談をさせていただきたいと思います。つきましては、来社可能な日時を平日10時から19時の間でいくつかご提示ください。調整の上、面談日程をお知らせいたします。なお、面談場所は弊社本社を予定しております。住所：東京都港区西麻布1-14-2 疋田ビル2階（来社の際はインターホンで202号室をお呼び出しください）当日は履歴書を職務経歴書をご持参ください。それでは、ご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
