- date: '2026-04-23'
  label: スカウト
  role: company
  text: 【港区｜北里研究所病院・三楽病院内サテライト】多職種体制（看護師+PT/OT/ST）／週3日から常勤選択可／有給ほぼ100%はじめまして。突然のご連絡大変失礼いたします、LCC訪問看護ステーションの水田と申します。この度は、ご経歴を拝見し、リハビリの臨床経験と専門性が当ステーションの目指すケアにマッチすると感じ、『理学療法士（正社員） - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。4年にわたる理学療法士の経験に加え、がんリハビリ研修を修了された専門性に注目しました。多職種が連携し幅広い疾患に対応する当ステーションで、その確かな実践力と勤勉な姿勢をぜひ活かしていただきたいです。訪問リハビリが初めての方もご安心ください。看護師に加えPT・OT・STが多数在籍する多職種体制の中で、入社後約1ヶ月は先輩が同行訪問しますので、自然に慣れていただけます。週3日勤務から常勤選択も可能で、ご希望の働き方のご相談を歓迎します。＜募集要項概要＞仕事内容・訪問リハビリ業務全般（脳血管・呼吸器・難病・小児・運動器・心臓・がんリハビリ、スポーツリハ）・バイタルチェック、健康状態観察、日常生活支援、高次脳機能障害リハ・歩行練習・医療・介護保険外リハビリにも対応・訪問件数：5件前後/日（電動自転車・電車・バスで移動）給与・月給：295,000〜478,800円（基本給245,000〜408,800円＋職務手当50,000〜70,000円）・入社祝金30,000円／副業OK勤務時間・9:00〜18:00（休憩60分）／残業ほぼなし（月20時間以内）休日・年間休日120日・週休2日シフト制・週3日勤務から常勤選択が可能／有給消化率ほぼ100%福利厚生・各種社会保険完備／研修制度あり・自転車・制服・携帯電話・iPad貸与・試用期間6ヶ月（給与変動なし）所在地：東京都港区西麻布1-14-2 疋田ビル2F訪問範囲：港区・渋谷区・千代田区中心（一部世田谷区・品川区・中央区・文京区）まずは「オンラインでのカジュアル面談」で、ざっくばらんにお話ししてみませんか？履歴書は不要です。「とりあえず職場の雰囲気だけ知りたい」という方も大歓迎です！ご返信を、心よりお待ちしております。LCC訪問看護ステーション 水田
- date: '2026-04-23'
  label: 応募
  role: candidate
  text: LCC訪問看護ステーション水田様お世話になっております。この度はスカウトのご連絡をいただきありがとうございます。また、これまでの経歴やがんリハビリの経験について評価いただき、大変嬉しく思っております。ご案内いただいた内容も拝見し、多職種で連携しながら幅広いリハビリに関われる点に魅力を感じております。一方で、現在所沢在住のため港区エリアへの通勤距離がやや長く、日常的な勤務のイメージとして少し検討が必要な状況です。働き方や通勤負担とのバランスも含めて、慎重に検討させていただければと考えております。この度はご丁寧にご連絡いただき、誠にありがとうございました。
- date: '2026-04-24'
  label: 通常
  role: company
  text: 三浦様ご丁寧に返信をいただきありがとうございます。通勤時間は少しご負担にはなりそうですね。ただ当ステーションでは1時間以上をかけて通勤してきてくれているスタッフもおりますので、ぜひご検討ください。まずは話を聞いてみたいといったカジュアルなものでも大歓迎です。よろしくお願い申し上げます。ライフ・ケア・コンシェルジュ（株）代表　水田
