  text: はじめまして。LCC訪問看護ステーションの採用担当です。弊所は東京都の港区、渋谷区・千代田区を中心に「『生きる』を楽しむ」をテーマに、利用者様の暮らしに寄り添うケアの提案・提供に心がけています。プロフィールを拝見してスカウトをお送りさせていただきました。現在、拠点の拡充などもあり私たちと一緒に成長を楽しめる方を募集しています。【募集内容】募集職種    看護師/准看護師正職員　月給290,000円〜580,000円住所　東京都港区西麻布1-14-2 疋田ビル2Fアクセス　東京メトロ千代田線 乃木坂駅から徒歩で8分東京メトロ日比谷線 六本木駅から徒歩で10分特徴　訪問看護ステーション、ブランク可、日勤のみ可、4週8休以上、社会保険完備、残業ほぼなし、年間休日120日以上、交通費支給、住宅手当、研修制度あり、年収600万円以上可能、年収500万円以上可能、40代活躍、50代活躍、WEB面接可、残業月20時間以内少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
