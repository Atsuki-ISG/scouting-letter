  text: 池田 麻理　様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。会社説明と見学をご希望とのことですね。ご存知の通り訪問看護ステーションとなりますので、見学は事務所を見ていただくのみとなりますが、来所は三楽病院サテライトがよろしいでしょうか。また、来社可能な日時をいくつかお知らせいただければ、日程を調整させていただきます。週明けサテライト長などのスケジュールを確認の上、あらためてご連絡さしあげます。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
