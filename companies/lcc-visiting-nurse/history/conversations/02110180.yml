  text: この度は、ジョブメドレーの求人広告を見て応募いたしました。宜しければ、面接の機会をいただけましたら幸いです。ご多忙の所恐縮ですが、どうぞよろしくお願い致します。■応募勤務形態 パート・バイト■資格 看護師,自動車運転免許
- date: '2025-03-23'
  label: 通常
  role: company
  text: 石原礼子　様この度は弊社求人にご応募いただき誠にありがとうございます。パートでのお仕事をご希望とのことですが、勤務日数や時間など就労形態についてはいかがお考えでしょうか。また、面談に際してお越しいただける日時を平日10時から19時の間でいくつかお知らせ下さい。調整の上で改めて面談日程をご案内いたします。なお、面談場所は弊社本社を予定しております。住所：東京都港区西麻布1-14-2 疋田ビル2階それでは、ご連絡お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
- date: '2025-03-23'
  label: 通常
  role: candidate
  text: 採用担当者様 ご連絡ありがとうございます。 ダブルワークの為、日曜日固定で考えています。 このような働き方でも可能でしょうか？ よろしくお願いいたします。 石原礼子
- date: '2025-03-23'
  label: 通常
  role: company
  text: 石原様ご返信ありがとうございます。週1日や2日勤務は可能ではあるのですが、土日いずれかの勤務のみの場合はお断りをしております。土日はもともと勤務者も少なく、管理者が不在であることなどから連携やサポートの観点からその様な対応をしております。悪しからずご了承ください。せっかく弊社求人にご興味をお持ちいただきましたが、誠に申し訳ございません。ライフ・ケア・コンシェルジュ（株）人事採用担当
