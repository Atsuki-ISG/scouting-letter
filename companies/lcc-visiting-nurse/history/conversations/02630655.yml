  text: 一木様先ほどはお忙しい中、オンライン面談ありがとうございました。選考をご希望とのこと、三枝から伺いました。つきましては、2月16日（月）10時で来社いただくことは可能でしょうか。面談場所は弊社本社を予定しております。住所：東京都港区西麻布1-14-2 疋田ビル2階（来社の際は外階段から2階のエントランスに入り202号室を呼び出しください）当日は履歴書・職務経歴書をご持参ください。上記日程でご都合がつかない場合は別途日時のご希望をお知らせください。よろしくお願い申し上げます。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
