  text: 一木 千絵 様お世話になっております。LCC訪問看護ステーションの採用担当でございます。この度は、ご返信いただき、誠にありがとうございます。早速ではございますが、日程調整をさせていただきたく存じます。お手数ですが、一木様のご都合の良い日程をいくつか頂戴することは可能でしょうか。下記のURLよりご調整いただくことも可能ですので、必要に応じてコピーしてご利用いただけますと幸いです。日程調整はこちら▼https://timerex.net/s/lcc/f7132cf4また面談につきましては、オンラインでの実施も承っておりまして、一木様は対面とオンラインですと、どちらがご対応いただきやすいでしょうか。お忙しい中恐縮ですが、ご確認いただけますと幸いです。何卒よろしくお願い申し上げます。
