- date: '2026-04-21'
  label: スカウト
  role: company
  text: 【プレミアムスカウト】※一部選考スキップでのご案内このスカウトは、ご経歴を拝見し「ぜひ当ステーションにお迎えしたい」と判断した方にのみお送りしております。感染管理認定看護師やステーション立ち上げ責任者の実績に注目しました。教育ステーションの機能も持つ当職場で、専門知識とマネジメント力を活かし、多職種チームの質の向上を牽引していただくことを期待しております。訪問看護で最も重要なのは、利用者様一人ひとりの変化に気づき対応できる臨床力です。これは現場でしか培えないものであり、経歴よりまさにその力をお持ちの方だと感じております。そのため今回は書類選考をスキップし、面談確約としてご案内させていただきます。「訪問看護は経験がないけど大丈夫かな…」と思われるかもしれません。実際、当ステーションのスタッフは9割が訪問看護未経験からのスタートです。入社後約1ヶ月は先輩が同行訪問しますので、訪問の流れは現場で自然に身につきます。病棟から転職したスタッフからは、こんな声をもらっています。「一人ひとりにじっくり向き合える看護ができるようになった」「残業がほぼなくなって、自分の時間が持てるようになった」「最初は不安だったけど、同行期間があったので安心して慣れることができた」教育体制のポイント：・東京都訪問看護教育ステーション事業を受託する教育体制・入社後約1ヶ月は先輩が同行訪問・9割が未経験スタート → 「教え慣れている」環境です＜募集要項概要＞仕事内容訪問看護ステーションにて、看護業務を行っていただきます。・日常生活の支援・薬の管理と指導・床ずれの予防・処置・介護相談・医療器具の管理（人工呼吸、胃瘻、在宅酸素など）・外出の同行・計画書や報告書の作成・ご利用者様宅の担当者会議や地域会議参加・オンコール当番（3～5回/月）給与： 331,000円 〜 594,000円特徴：・完全週休二日制！年末年始休暇など、年間休日120日・残業ほぼなし！ワークライフバランスを重視・産休・育休・有給の取得がしやすい環境◎・在宅医療を学ぶことができ、成長・スキルアップ可能・Wワーク・副業OK！一人ひとりに合わせた柔軟な働き方◎勤務時間：・9:00～18:00（休憩60分）*残業ほぼなし福利厚生：・各種社会保険完備・研修制度あり*訪問看護が初めての方でもご安心ください。・自転車・制服の貸与あり・携帯電話・ipadの貸与あり・社員表彰式あり所在地：東京都港区西麻布1-14-2 疋田ビル2F訪問範囲：港区、渋谷区、千代田区中心（一部世田谷区、品川区、中央区、文京区）ご興味を少しでもお持ちいただけましたら、まずは15分ほどのオンライン面談でお話ししませんか？プレミアムスカウトからのご応募ですので、書類選考なしでそのまま面談に進めます。履歴書不要・服装自由、「とりあえず話だけ聞いてみたい」も大歓迎です。ご返信お待ちしております。LCC訪問看護ステーション　採用担当
- date: '2026-04-22'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきましてありがとうございます。 本社でも処遇や業務はメンバーと一緒なのでしょうか？記入の状況みるとそう見えます
- date: '2026-04-22'
  label: 通常
  role: company
  text: 萩原 徹　様この度は弊社求人にお問い合わせいただき誠にありがとうございます。ご質問は、マネジメント職でも処遇や業務がメンバーと同じかと言うこと意味ですね。そのような意味ではもちろん役割にともなう業務や処遇とさせていただきます。萩原様がどのようや役割やポストでの転職をご希望なのか分かりませんので、具体的なお話はできませんが、現状弊社では専ら管理業務や間接業務をお任せするポストでの採用は行っておりません。一方で、組織の拡大に向けて拠点長候補や管理者候補の採用は恒常的に行っており、それに見合う役割や処遇は行っております。追加のご質問などあれば遠慮なくお問い合わせください。ご検討よろしくお願いいたします。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
