- date: '2025-08-14'
  label: スカウト
  role: company
  text: はじめまして。LCC訪問看護ステーションの採用担当です。弊所は東京都の港区、渋谷区・千代田区を中心に「『生きる』を楽しむ」をテーマに、利用者様の暮らしに寄り添うケアの提案・提供に心がけています。プロフィールを拝見してスカウトをお送りさせていただきました。現在、拠点の拡充などもあり私たちと一緒に成長を楽しめる方を募集しています。【募集内容】募集職種    看護師/准看護師正職員　月給290,000円〜580,000円住所　東京都港区西麻布1-14-2 疋田ビル2Fアクセス　東京メトロ千代田線 乃木坂駅から徒歩で8分東京メトロ日比谷線 六本木駅から徒歩で10分特徴　訪問看護ステーション、ブランク可、日勤のみ可、4週8休以上、社会保険完備、残業ほぼなし、年間休日120日以上、交通費支給、住宅手当、研修制度あり、年収600万円以上可能、年収500万円以上可能、40代活躍、50代活躍、WEB面接可、残業月20時間以内少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
- date: '2025-08-14'
  label: 応募
  role: candidate
  text: LCC訪問看護ステーション ご採用ご担当者様この度はスカウトをいただきましてありがとうございます。伺いたい内容があり、ご連絡させていただきました。私はブランクが約3年あります。また臨床経験はありますが、ほとんどが個人の小さな美容皮膚科、外科、皮膚科、形成外科のクリニックでの経験がほとんどで、総合病院では、半年ほどの経験しかこざいません。ですので、それでも経験を積ませて下さり、教育してくださる職場環境が整っているのであれば、成長したい気持ちがありますので、興味があり検討したいと考えています。またプロフィールにも表記しておりますが、転職が3ヶ月以上先になりますがそちらは大丈夫でしょうか？どうぞ宜しくお願い致します。
- date: '2025-08-14'
  label: 通常
  role: company
  text: 柴垣 麻衣　様この度は弊社求人に興味をお持ちいただき誠にありがとうございます。ご経験内容確認いたしました。訪問看護は医療機器操作や手技獲得などの観点からはトレーニング機会が、病院に比べ限定的で少ない面は否めません。一方で在宅ならではのケアややりがいを得られることもございます。柴垣様のこれまでのご経験や今後のキャリアプランなどをお聞きした上で、当社での勤務可能性をご相談させていただくことは可能です。転職時期が少し先になることも承知いたしました。もしご興味おありであれば、一度面談をさせていただきたいと存じます。来週以降平日10時から19時の間で来社可能な日時をいくつか頂戴できれば、調整の上面談日程をご案内いたします。それではご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
