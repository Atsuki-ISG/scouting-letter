  text: 君島 唯斗　様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。早速ですが、ぜひ一度面談をさせていただきたいと存じます。つきましては、来社可能な日時を平日10時から19時の間でいくつかお知らせ下さい。調整の上、あらためて面談日程をご案内させていただきます。なお、面談場所は弊社本社を予定しております。住所：東京都港区西麻布１−１４−２　疋田ビル2階（お越しの際はインターホンで202号室を呼び出し下さい）それでは、ご連絡お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
