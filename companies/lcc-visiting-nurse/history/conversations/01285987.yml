  text: はじめまして。突然のご連絡大変失礼いたします、LCC訪問看護ステーションの採用担当でございます。この度は、ご経歴を拝見し、LCC訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。リハビリテーション科病院や一般内科に加え、美容外科・美容皮膚科など多様な診療領域でご経験を積まれてきた点に魅力を感じました。それぞれの現場で求められる役割に柔軟に対応されてきたご経験は、利用者様一人ひとりに合わせた対応が求められる訪問看護において、大きな強みになると感じております。また、そのご経験と価値観は、地域に根差した当ステーションが目指す「誰もが自分らしく生きられる社会の実現」において、重要な役割を担っていただけると感じております。現在、LCC訪問看護ステーションでは、東京23区内でご勤務いただける看護師の方を募集しております。訪問範囲は、港区、渋谷区、千代田区中心で、一部世田谷区、品川区、中央区、文京区もございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境をお約束いたします。＜募集要項概要＞仕事内容 訪問看護ステーションにて、看護業務を行っていただきます。・日常生活の支援・薬の管理と指導・床ずれの予防・処置・介護相談・医療器具の管理（人工呼吸、胃瘻、在宅酸素など）・外出の同行・計画書や報告書の作成・ご利用者様宅の担当者会議や地域会議参加・オンコール当番（4～10回/月）給与： 331,000円 〜 594,000円特徴：・完全週休二日制！年末年始休暇など、年間休日120日・残業ほぼなし！ワークライフバランスを重視・産休・育休・有給の取得がしやすい環境◎・在宅医療を学ぶことができ、成長・スキルアップ可能・社内メンター制度あり！充実した教育体制・同行訪問1ヶ月！訪問が初めての方でも大丈夫・Wワーク・副業OK！一人ひとりに合わせた柔軟な働き方◎・マネジメント未経験歓迎！育成・仕組みづくりを学べる環境あり・20代〜50代まで幅広い世代が活躍！ブランクOK・チームワーク重視！相談しやすい良好な人間関係あり・子育て中の方や大学院に通いながら勤務することも可能勤務時間：・9:00～18:00（休憩60分）*残業ほぼなし福利厚生：・各種社会保険完備・研修制度（社内メンター制度）あり*訪問看護が初めての方でもご安心ください。・自転車・制服の貸与あり・携帯電話・ipadの貸与あり・社員表彰式あり所在地： 東京都港区西麻布1-14-2 疋田ビル2F ＼インスタグラムで社員や職場の情報を発信中／@lifecareconciergeとインスタグラムで検索し、フォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインを想定しています。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。LCC訪問看護ステーション　採用担当
