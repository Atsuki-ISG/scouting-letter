  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。どうぞよろしくお願いいたします。
- date: '2025-05-07'
  label: 通常
  role: company
  text: 木村 菜月　様この度は弊社求人にご興味をお持ち頂き誠にありがとうございます。早速ですが、ぜひ一度ご面談をさせて頂きたいと存じます。つきましては、平日10時から19時の間で来社可能な日時をいくつかお知らせ下さい。調整の上でご面談日程をご案内いたします。なお、面談場所は弊社本社を予定しております。住所：東京都港区西麻布1-14-2 疋田ビル2階（来社の際はインターホンで202号室を呼び出し下さい）また、当日は履歴書・職務経歴書をご持参下さい。それでは、ご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
