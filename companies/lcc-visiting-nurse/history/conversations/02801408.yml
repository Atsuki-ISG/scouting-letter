  text: 木村 真理子　様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。ぜひ一度お話しさせていただきたいと存じます。つきましては、平日10時から19時の間で来社可能な日時をいくつかご提案いただければ、調整の上、面談日程をお知らせいたします。場所は弊社本社を予定しております。住所：東京都港区西麻布1-14-2 疋田ビル2階（来社の際は外階段から2階へあがりインターホンで202号室をお呼びだしください）※オンラインの対応も可能ですのでご希望の際はお知らせください。なお、合わせて選考をご希望の際はその旨お知らせください。それでは、ご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
