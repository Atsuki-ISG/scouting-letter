- date: '2026-04-03'
  label: スカウト
  role: company
  text: 【面談確約】「気になる」を押してくださり、ありがとうございます！充実した研修・教育体制！東京都訪問看護教育ステーションの指定あり！訪問看護師が初めての人でも大丈夫！見学・Web説明会実施中！はじめまして。突然のご連絡大変失礼いたします、LCC訪問看護ステーションの採用担当でございます。この度は、ご経歴を拝見し、LCC訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として10年以上ご経験され、その専門性を深めてこられた点に感銘を受けました。病院や診療所でのご勤務経験があられる点もとても素敵だと感じます。今すぐでの転職も歓迎ですし、パートさんも積極的に採用中。短時間でのご勤務もいただけます。これまでのご経験は、地域に根差した当ステーションが目指す「誰もが自分らしく生きられる社会の実現」において、重要な役割を担っていただけると感じております。現在、LCC訪問看護ステーションでは、東京23区内でご勤務いただける看護師の方を募集しております。訪問範囲は、港区、渋谷区、千代田区中心で、一部世田谷区、品川区、中央区、文京区もございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境をお約束いたします。＜募集要項概要＞仕事内容訪問看護ステーションにて、看護業務を行っていただきます。・日常生活の支援・薬の管理と指導・床ずれの予防・処置・介護相談・医療器具の管理（人工呼吸、胃瘻、在宅酸素など）・外出の同行・計画書や報告書の作成・ご利用者様宅の担当者会議や地域会議参加・オンコール当番（4～10回/月）特徴：・完全週休二日制！年末年始休暇など、年間休日120日・残業ほぼなし！ワークライフバランスを重視・産休・育休・有給の取得がしやすい環境◎・在宅医療を学ぶことができ、成長・スキルアップ可能・Wワーク・副業OK！一人ひとりに合わせた柔軟な働き方◎勤務時間：・9:00～18:00（休憩60分）*残業ほぼなし福利厚生：・各種社会保険完備・研修制度（社内メンター制度）あり*訪問看護が初めての方でもご安心ください。・自転車・制服の貸与あり・携帯電話・ipadの貸与あり・社員表彰式あり所在地：東京都港区西麻布1-14-2 疋田ビル2F＼インスタグラムで社員や職場の情報を発信中／@lifecareconciergeとインスタグラムで検索し、フォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可！）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。LCC訪問看護ステーション　採用担当
