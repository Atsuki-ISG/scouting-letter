messages:
- date: '2026-01-21'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、LCC訪問看護ステーションの採用担当でございます。この度は、ご経歴を拝見し、LCC訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として10年以上ご経験され、その専門性を深めてこられた点に感銘を受けました。病院や訪問看護ステーションでのご勤務経験が多い点も素敵だと感じます。そのご経験は、地域に根差した当ステーションが目指す「誰もが自分らしく生きられる社会の実現」において、重要な役割を担っていただけると感じております。現在、LCC訪問看護ステーションでは、東京23区内でご勤務いただける訪問看護師の方を募集しております。訪問範囲は、港区、渋谷区、千代田区中心で、一部世田谷区、品川区、中央区、文京区もございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境をお約束いたします。＜募集要項概要＞仕事内容 訪問看護ステーションにて、看護業務を行っていただきます。・日常生活の支援・薬の管理と指導・床ずれの予防・処置・医療器具の管理（人工呼吸、胃瘻、在宅酸素など）・計画書や報告書の作成・ご利用者様宅の担当者会議や地域会議参加給与： 月給 295,000円 〜 478,800円特徴：・完全週休二日制！年末年始休暇など、年間休日120日・残業ほぼなし！ワークライフバランスを重視・産休・育休・有給の取得がしやすい環境◎・在宅医療を学ぶことができ、成長・スキルアップ可能・社内メンター制度あり！充実した教育体制・同行訪問1ヶ月！訪問が初めての方でも大丈夫・Wワーク・副業OK！一人ひとりに合わせた柔軟な働き方◎・マネジメント未経験歓迎！育成・仕組みづくりを学べる環境あり・20代〜50代まで幅広い世代が活躍！ブランクOK・チームワーク重視！相談しやすい良好な人間関係あり・子育て中の方や大学院に通いながら勤務することも可能勤務時間：・9:00～18:00（休憩60分）*残業ほぼなし福利厚生：・各種社会保険完備・研修制度（社内メンター制度）あり*訪問看護が初めての方でもご安心ください。・自転車・制服の貸与あり・携帯電話・ipadの貸与あり・社員表彰式あり所在地： 渋谷サテライト：東京都渋谷区上原1-38-11 シャトー代々木上原204 ＼インスタグラムで社員や職場の情報を発信中／@lifecareconciergeとインスタグラムで検索し、フォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインを想定しています。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。LCC訪問看護ステーション　採用担当
- date: '2026-01-22'
  label: 応募
  role: candidate
  text: LCC訪問看護ステーション採用ご担当者様この度はスカウトのご連絡をいただき、誠にありがとうございます。これまでの経験をご評価いただき、大変光栄に思っております。現在、転職にあたっては「無理なく長く臨床に集中できる環境」を重視して検討しております。貴ステーションの取り組みや実際の働き方について、ぜひ一度カジュアル面談にて詳しくお話を伺えればと考えております。可能でしたら、事前に下記についても共有いただけますと幸いです。・1日の平均訪問件数・オンコール体制（有無、頻度、対応体制）・記録業務の運用（業務時間内完結の可否）・担当制の有無・想定される初期給与レンジ面談はオンラインでの実施も可能です。何卒よろしくお願いいたします。
- date: '2026-01-23'
  label: 通常
  role: company
  text: 村本 直代 様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。ご質問いただきました件、以下回答させていただいます。１．1日の訪問件数について　5件〜6件程度で計画を組んでおります。1ヶ月平均実績は5件程度かと思います。２．オンコール体制について　常勤スタッフで月に4回〜5回程度ですが、さまざまな事情も考慮してそれより　少ないスタッフ、免除しているスタッフもおります。　対応体制は現状では、港区在住者は自宅で、それ以外のスタッフは担当日は　港区内（2ヶ所いずれか）の待機所に宿泊しておらっています。３．記録業務について　基本的には勤務時間内に終了しているスタッフが大半だと思いますが、iPadを　貸与しており、自宅に持ち帰って記録（月間の計画書・報告書含）している　スタッフもおります。　もちろんそのことを推奨しておりませんが、一方で直行・直帰するスタッフも　いるため禁止もしておりません。　ちなみに平均的な月の残業時間はゼロから多くても5時間未満です。４．担当制の有無について　基本的には担当制としております。ただし週複数回の訪問がある場合は他の　スタッフが担当するなど、可能な限り1名しか対応できない状況をつくないよ　うにしております。　なお土日の勤務に関しましては出勤者が少ないこともあり完全にチーム制と　しております。５．想定される初期給与レンジについて　一概にお知らせしにくいのですが、一般スタッフ（非マネジメント職）で常勤、　オンコールなども平均的に行っていただく前提で、概ね臨床経験が15年以上の　方の場合は500万程度が想定されます。　もちろん選考評価に前後することはございますので、あらかじめご了承下さい。詳細につきましては、カジュアル面談でお伝えできればと思いますが、来社が可能であればお越しいただける雰囲気などもよりお伝えできるのではないかと思います。ご検討よろしくお願いいたします。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
