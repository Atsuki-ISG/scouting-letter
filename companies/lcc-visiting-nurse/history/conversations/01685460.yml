  text: 船戸様お世話になっております。適性試験の対応ありがとうございました。本結果も踏まえた選考の結果、船戸様をぜひ採用させていただきたいと存じます。なお、採用にあたって何点か勤務条件の通知ならびにご相談がございます。１．時間給はご希望いただいている1,720円とさせていただければと思います。２．勤務時間はご希望通り1日6時間平日5日勤務。休日は土日祝日、その他年末年始（4日間）。　　　　勤務時間帯は勤務の途中でお昼休憩を45分とっていただくことにしたいと思います。　　時間外勤務をお願いすることは多くはありませんが、ゼロではありません。　　その際に労働時間が6時間を超えからといって、時間外労働前に休憩をとっていただく　　ことも現実的ではありませんし、またお昼に食事をされないのも他のメンバーも気を　　つかうと思います。　　そこで、勤務開始の時刻と終了の時刻についてどのようにしましょうか。　　10時始業、16時45分終業のように終業時間のみで調整するか、始業時間を少し早めるの　　か、ある程度柔軟に対応できますので、ご希望をお知らせください。　３．入社日について、面接の際のお話ですと年明け1月からということでよろしいでしょうか。　　当社としては、前倒しで12月の月中での入社でも全く問題ありません。　　こちらもご希望お知らせください。４．その他、社会保険加入、通勤交通費は1ヶ月定期代支給（上限3万）上記の件と合わせて最終的な入社のご意思のご連絡をください。ご連絡をお待ちして、雇用条件通知書をメールにて送付させていただく予定です。よろしくお願い申し上げます。ライフ・ケア・コンシェルジュ（株）水田
