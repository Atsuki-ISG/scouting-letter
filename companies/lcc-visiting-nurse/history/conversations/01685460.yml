  text: ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション水田誠 様ご連絡が遅くなり大変申し訳ございません。このたびは内定のご連絡をいただき、誠にありがとうございます。謹んで貴社からの内定をお受けいたします。勤務条件に関する通知およびご相談の件につきまして、以下にてご確認いただければと思います。1. この度は時給の再検討をしていただき、誠にありがとうございます。ご配慮いただいたことに感謝申し上げます。ご提示の時給額、承諾いたします。2.お昼休憩についてご相談があります。面接時にお話いただいておりました30分の休憩では難しいでしょうか。その際の勤務時間は9時45分から16時15分、もしくは9時30分から16時をイメージしていたのですがいかがでしょうか。3.入社日なのですが、管理者が今週末までお休みでして、まだ退職したい旨を伝えてられておらず、具体的なお日にちは来週のご連絡になってしまってもよろしいでしょうか。4.承知しました。社会保険は加入させていただきたいと思います。同じ質問で恐縮ですが、昇給の有無につきまして、改めて確認させていただけますでしょうか。以前、昇給は定期に必ず行うものではなく、評価に応じて年1回見直しを行っているとのことでしたが、実際に昇給の機会はどの程度あるのでしょうか。毎年必ず自動的に昇給する訳ではないとなると、働く上でのモチベーションにも関わるため、事前に把握できれば幸いです。お手数ですが、同じご質問になりますが、再度ご教示いただければ幸いです。お忙しい中、質問が多くなり申し訳ありません。お手数をおかけいたしますが、ご確認のほどよろしくお願い申し上げます。
