  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。どうぞよろしくお願いいたします。
- date: '2025-07-26'
  label: 通常
  role: company
  text: 大江美優　様この度は弊社求人にご興味をお持ちいただき誠にありがとうございます。さて、今回パートでの勤務をご希望との事ですが、弊社では週1、2日からの勤務が可能なのですが、いくつかお願いしていることがございます。まず、勤務曜日を固定して頂くこと。また、弊社の勤務以外で既に40時間程度の勤務をされている場合は労働安全衛生の観点から勤務をお断りさせていただくことがございます。以上問題なければ、是非一度面談をさせていただきたいと思います。来社可能な日時を平日10時〜19時の間でご希望いくつかご提示下さい。調整の上、改めて面談日程をご案内いたします。それでは、ご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
