  text: 許 涵　様この度は弊社求人にお問い合わせいただき誠にありがとうございます。パートタイムでのお仕事をお探しとのことですが、週の勤務日数や曜日、時間帯などのご希望はいかがでしょうか。また、合わせてこれまでのお仕事経験など簡単で構いませんので、お知らせ下さい。ご返信お待ちしております。ライフ・ケア・コンシェルジュ（株）LCC訪問看護ステーション人事採用担当
