  text: お世話になっております。今月ですと、24日(火)の13時〜17時25日(水)でしたら終日可能です。まだ来月の予定が分からず、現在時点で平日ですと上記2日のみになってしまいます。お忙しい中恐縮ですが、ご確認よろしくお願いたします。ご都合が付かない場合は、メッセージいただければ再度日付を提示させていただきます。
