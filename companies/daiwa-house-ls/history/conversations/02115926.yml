  text: 【面談確約】入居募集の営業活動や見学会のご案内、ご契約対応をいただける入居相談員募集！静岡県で生活相談員の経験を活かしませんか？はじめまして。突然のご連絡大変失礼いたします、大和ハウスライフサポート勝又でございます。この度は、ご経歴を拝見し、当社の運営する有料老人ホーム「ネオ・サミット湯河原」における『入居相談員 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。プロフィールを拝見し、40代というご年齢で、介護職/ヘルパー（7年）, 営業（3年）, 管理職（介護）（2年）, 介護事務（1年）のご経験があり、介護福祉士, 自動車運転免許の資格を持っていらっしゃる点に大変注目いたしました。これまでのご経験は、当社が目指す「ご入居者お一人おひとりの生き方に寄り添う」という理念の実現において、非常に重要な役割を担っていただけると感じております。現在、ネオ・サミット湯河原では、入居募集の営業活動や見学会のご案内、ご契約対応をお任せできる入居相談員を募集しております。当社は、大和ハウスグループの安定基盤のもと、年間休日121日や手厚い福利厚生（グループ割引や転居費用補助など）を整えており、ワークライフバランスを重視して長期的に活躍できる環境を提供しております。＜募集要項概要＞仕事内容 ：・有料老人ホームへの入居募集営業活動・紹介会社、病院、介護事業者、役所等へのアプローチ・見学会等の企画・案内・資料作成・入居契約対応給与：・月収総額：254,000円 ～ 304,000円（※経験・年齢を考慮の上優遇）・想定年収：346万円～550万円程度（※営業報奨金・残業代等含む場合）特徴：☆ 新入社員サポート体制（OJT、メンター制度）で中途入社でも安心の成長環境！☆ 賞与（年2回）・昇給（年1回）あり！退職金制度・再雇用制度あり！☆ 年間休日121日！シフト制（月10日休）でプライベートも充実◎☆ 入社初日から有給休暇付与！特別休暇も完備☆ 単身赴任最大40万円、家族同伴最大70万円の転居費用補助制度あり！☆ 大和ハウスグループ各社割引制度（ホテル、スポーツクラブ等）など福利厚生充実！☆ アットホームで風通しが良く、中途社員でも馴染みやすい環境◎勤務時間：8:30～17:15（7時間45分）勤務地：・〒413-0001 静岡県熱海市泉17-2 ネオ・サミット湯河原 （※車、バイク、自転車通勤可）ご興味をお持ちいただけましたら、当施設のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。大和ハウスライフサポート株式会社 勝又
