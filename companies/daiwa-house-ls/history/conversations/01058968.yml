  text: この度はスカウトをいただきましてありがとうございます。 フルリモート（完全在宅）での業務を業務委託なら可能なので、ぜひ一度、お電話または、オンライン（WEB）等にて、お話を伺いたく思いますので、ご連絡させていただきました。よろしくお願いいたします。
