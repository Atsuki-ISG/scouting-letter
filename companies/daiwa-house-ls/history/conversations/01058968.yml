  text: スカウトへのご返信、ならびにお話しいただける機会をご検討くださりありがとうございます。ご希望条件として伺いました「フルリモート・業務委託」の件ですが、現状の弊社の体制では出社が必須となっており、現段階でのお引き受けが難しいのが実情でございます。木村様のこれまでのご実績を拝見し、ぜひお話を伺いたいと考えておりましたが、条件面でミスマッチがある状態でお時間をいただくのも心苦しいため、今回は一旦見送りとさせていただければと存じます。状況が変わり、柔軟な働き方が提示できるようになった際には、こちらから再度ご連絡させていただいてもよろしいでしょうか。何卒ご了承いただけますようお願い申し上げます。
