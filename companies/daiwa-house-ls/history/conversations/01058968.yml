  text: 【熱海・湯河原Uターン歓迎｜相模湾一望のリゾート立地】転居補助70万／営業奨励金年50万／入社初日から有給／10-20年伴走する営業はじめまして。突然のご連絡大変失礼いたします、大和ハウスライフサポートの勝又でございます。この度は、ご経歴を拝見し、当社の運営する有料老人ホーム「ネオ・サミット湯河原」における『入居相談員（正職員） - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。10年以上にわたり介護・福祉の現場で歩んでこられたご経歴に惹かれました。ご入居者様やご家族と真摯に向き合ってこられたご経験は、ご入居を検討されるご本人様やご家族の気持ちに寄り添う私たちの入居相談員のお仕事で、自然と活きる場面が多いのではと感じています。ぜひ一度お話しできましたら嬉しく思います。入居相談員は、ご入居者やご家族にとって「見学する」「契約する」という大きな決断の場面に立ち会う仕事です。大和ハウスグループの安定基盤のもと、OJT・メンター制度で中途入社の方も丁寧にお迎えしてきました。＜募集要項概要＞仕事内容・有料老人ホームへの入居募集営業活動・紹介会社・病院・介護事業者・役所等へのアプローチ・見学会の企画・案内／資料作成・入居契約対応／入居後のフォロー給与・月給：254,000〜304,000円（職能給230,000〜250,000円＋役割給・資格手当・家族手当・処遇改善手当含む）・営業奨励金：年10件達成で500,000円（月1件ペース）・想定年収：副主任／1年目 460万円、主任／3年目 540万円・賞与年2回・昇給年1回／退職金制度あり勤務時間・8:30〜17:15（休憩60分／所定労働時間7時間45分）休日・年間休日121日・シフト制（月10日休）・入社初日から有給休暇付与／特別休暇あり・育児・介護・看護休暇あり福利厚生・大和ハウスグループ各社割引（ホテル・スポーツクラブ・ゴルフ場等）・転居費用補助：単身最大400,000円／家族同伴最大700,000円・OJT制度・メンター制度／資格取得支援制度あり・60歳定年・再雇用制度あり所在地：静岡県熱海市泉17-2（湯河原駅アクセス・車／バイク／自転車通勤可・駐車場あり）応募要件：無資格可・ブランク可・学歴不問ご興味をお持ちいただけましたら、当施設のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。大和ハウスライフサポート株式会社　勝又
