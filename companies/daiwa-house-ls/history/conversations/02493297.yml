  text: この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いご連絡させていただきました。休日はシフト制となっておりますが、土日祝日お休みとも書いてあります。基本的には土日祝日お休みという認識でよろしいでしょうか？また大変求人に興味を持っているのですが、現在自家用車を手放してしまいました。働く場合は自家用車は必要になりますでしょうか？
