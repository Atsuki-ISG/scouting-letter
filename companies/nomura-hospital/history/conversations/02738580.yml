- date: '2026-03-16'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、医療法人天秋会 野村病院の採用担当と申します。この度は、ご経歴を拝見し、当院の『病棟看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として10年以上ご活躍され、カラーセラピスト、準音楽指導士、心理カウンセリング、認知症介護士などの資格を取得され、その専門性を深めてこられた点や、皆を笑顔にしたいという思いに感銘を受けました。精神科患者様の高齢化も進み、認知症患者様の対応も大切な看護となります。今まで培ってこられた才能や資質を活かしていただけたら幸いです。山口県下関市を希望勤務地に入れてくださっている点もとても素敵だと感じます。これまでのご経験は、地域に根差した当院が目指す「地域の皆様に寄り添う精神科医療」において、重要な役割を担っていただけると感じております。現在、野村病院では、山口県下関市でご勤務いただける病棟看護師を急募しております。当院は、スタッフが安心して働けるよう、事前の「院内見学・説明会」を積極的に受け入れており、ご希望の方には入職後のミスマッチを防ぐための簡易的な業務体験の機会もご用意しています。一人ひとりのライフステージやご希望に合わせて、日勤のみや夜勤のみなど柔軟な働き方を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：精神科病棟における看護業務全般（患者様の日々の体調管理、服薬管理、日常生活援助や対話を通じたケアなどを行っていただきます。）お客様の特徴：様々な症状を抱える精神疾患の患者様、およびそれに合わせた精神科医療給与： 月給 186,000円 〜 370,000円 （※管理職候補の場合は月給30.0〜37.0万円、一般の常勤正・准看護師は月給18.6〜22.1万円など、ご経験・スキル・ご希望の働き方により決定いたします。）特徴：☆ 精神科未経験・ブランクOK！ 現場のスタッフがしっかりサポートします☆ 管理職候補・キャリアアップ歓迎！ 月給37万円以上や高水準の賞与実績あり☆ 車通勤可（駐車場有）・寮完備！ 遠方からの就業もサポート☆ 敷地内禁煙！職員の健康とクリーンな環境への配慮あり☆ 事前の院内見学や説明会が可能！ 職場の雰囲気を事前に確認できる安心の環境☆ 日勤のみ、2交代、夜勤のみなど、働き方のご相談可能勤務時間：・日勤：8:00～17:00（休憩60分）・夜勤：16:45～8:45（休憩180分）※ご希望の働き方をご相談可能勤務地：・〒759-6604 山口県下関市大字横野1038-1・JR山陰本線「安岡駅」または「福江駅」（徒歩18分）ご興味をお持ちいただけましたら、当院のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（まずは見学だけ、またはカジュアル面談からといったご希望も大歓迎です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。医療法人天秋会 野村病院 採用担当
