  text: はじめまして。山口県下関市 野村病院の採用担当です。プロフィールを拝見して、ぜひ直接会ってお話したいと思いスカウトをお送りさせていただきました。現在、野村病院では看護師/准看護師としてご活躍いただける方を募集しています。もしよろしければ見学を兼ねて面接にお越しいただけませんか？【募集内容】募集職種    看護師/准看護師正職員　月給160,000円〜195,000円住所　山口県下関市横野町1038-1アクセス　JR山陰本線(益田〜下関) 安岡駅から徒歩で18分JR山陰本線(益田〜下関) 福江駅から徒歩で18分特徴　未経験可、一般内科、神経内科、精神科・心療内科、一般病院、病棟、日勤のみ可、社会保険完備、車通勤可、准看護師可、育児支援あり、残業ほぼなし、ボーナス・賞与あり、交通費支給、年齢不問、新卒可、退職金あり、住宅手当少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
