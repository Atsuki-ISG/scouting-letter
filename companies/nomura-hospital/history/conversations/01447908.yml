- date: '2026-04-06'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、医療法人天秋会 野村病院の採用担当と申します。この度は、ご経歴を拝見し、当院の『管理栄養士/栄養士』のポジションをご検討いただきたく、ご連絡いたしました。10年以上の管理栄養士としてのご経験と、現在精神科病院でご活躍されている点に注目いたしました。対話と個性を大切にする当院の精神科医療において、その確かな実践力を存分に発揮していただけます。残業がほぼない安定した環境をご用意しております。これまでのご経験は、患者様の心と体の両面を支える当院の栄養管理において、大いに活かしていただけると感じております。現在、野村病院では、山口県下関市でご勤務いただける管理栄養士を募集しております。業務経験がなくても、先輩スタッフと一緒に取り組める環境ですのでご安心ください。＜募集要項概要＞雇用形態：契約職員仕事内容：管理栄養士業務全般（栄養管理、材料管理、衛生管理、施設管理、業務管理、パソコン入力など）給与：月給 200,000円 〜 290,000円（基本給180,000〜270,000円 + 職種手当15,000円 + 特殊勤務手当5,000円）賞与あり（年2回、計3ヵ月分）特徴：☆ 未経験OK！管理栄養士資格があれば業務経験は問いません☆ 残業ほぼなし！ご家庭との両立もしやすい環境です☆ 夜勤なし！日勤のみで安定した生活リズムを保てます☆ マイカー通勤OK（通勤手当あり・上限20,000円/月）☆ 社会保険完備勤務時間：・平日：8:00～17:00（休憩60分）・土曜：8:00～12:00※時間外ほぼなし勤務地：・〒759-6604 山口県下関市大字横野1038-1・JR山陰本線「安岡駅」または「福江駅」（徒歩18分）ご興味をお持ちいただけましたら、当院のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（まずは見学だけ、といったご希望も大歓迎です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。医療法人天秋会 野村病院 採用担当
- date: '2026-04-13'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきまして大変ありがとうございます。返信が遅れ大変申し訳ございません。精神科の患者様の栄養管理は大変難しく日々勉強中です。前職の経験を評価して頂き大変嬉しく思っております。貴院は一般病院とのことで大変関心がありますが転職は正社員を希望しております。また自宅から貴院まで少し距離がありますので自宅を早い時間に出なくてはならない点に少し不安がありスカウトを迷っております。今の気持ちをお伝えしたいと思い返信させて頂きました。よろしくお願い致します。
- date: '2026-04-13'
  label: 通常
  role: company
  text: ご連絡ありがとうございます。当院は精神科病院でして、貴方様の経験がとても必要だと考えております。また、正社員としての採用を考えており、通勤距離の関係での勤務時間のことについても検討できます。もしも当院に興味がございましたら、何卒検討して頂けると幸いです。
