messages:
- date: '2026-03-16'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、医療法人天秋会 野村病院の採用担当と申します。この度は、ご経歴を拝見し、当院の『病棟看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。介護職として5年経験され、その後看護師として6年ご活躍されてこられた点に感銘を受けました。精神科病院では、内科的な看護視点以外にも、日常生活援助という視点が重要になってきます。介護職と看護師両面のご経験を活かしていただけたら嬉しいです。山口県下関市を希望勤務地に入れてくださっている点もとても素敵だと感じます。これまでのご経験は、地域に根差した当院が目指す「地域の皆様に寄り添う精神科医療」において、重要な役割を担っていただけると感じております。現在、野村病院では、山口県下関市でご勤務いただける病棟看護師を急募しております。当院は、スタッフが安心して働けるよう、事前の「院内見学・説明会」を積極的に受け入れており、ご希望の方には入職後のミスマッチを防ぐための簡易的な業務体験の機会もご用意しています。一人ひとりのライフステージやご希望に合わせて、日勤のみや夜勤のみなど柔軟な働き方を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：精神科病棟における看護業務全般（患者様の日々の体調管理、服薬管理、日常生活援助や対話を通じたケアなどを行っていただきます。）お客様の特徴：様々な症状を抱える精神疾患の患者様、およびそれに合わせた精神科医療給与： 月給 186,000円 〜 370,000円 （※管理職候補の場合は月給30.0〜37.0万円、一般の常勤正・准看護師は月給18.6〜22.1万円など、ご経験・スキル・ご希望の働き方により決定いたします。）特徴：☆ 精神科未経験・ブランクOK！ 現場のスタッフがしっかりサポートします☆ 管理職候補・キャリアアップ歓迎！ 月給37万円以上や高水準の賞与実績あり☆ 車通勤可（駐車場有）・寮完備！ 遠方からの就業もサポート☆ 敷地内禁煙！職員の健康とクリーンな環境への配慮あり☆ 事前の院内見学や説明会が可能！ 職場の雰囲気を事前に確認できる安心の環境☆ 日勤のみ、2交代、夜勤のみなど、働き方のご相談可能勤務時間：・日勤：8:00～17:00（休憩60分）・夜勤：16:45～8:45（休憩180分）※ご希望の働き方をご相談可能勤務地：・〒759-6604 山口県下関市大字横野1038-1・JR山陰本線「安岡駅」または「福江駅」（徒歩18分）ご興味をお持ちいただけましたら、当院のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（まずは見学だけ、またはカジュアル面談からといったご希望も大歓迎です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。医療法人天秋会 野村病院 採用担当
- date: '2026-03-18'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきましてありがとうございます。勤務年数や介護と看護の経験について評価して頂いた事、感謝してます。どんな雰囲気か気になりますが、現在まだ在職中でして、休みの日に短時間で働ける場所を探している為、条件が合わないのかなと思いますので、今回のお話は無効とさせて下さい。スカウトして下さったのに申し訳ありません。
- date: '2026-03-31'
  label: 通常
  role: company
  text: 世良さま、ご丁寧にご連絡ありがとうございます。またお返事が遅れてしまったことお詫び申し上げます。当院では2時間からの非常勤職員も募集しております。そちらの条件でしたら勤務は検討可能でしょうか。お返事お待ちしております。
- date: '2026-03-31'
  label: 通常
  role: candidate
  text: お世話になっております。お返事ありがとうございました。短時間でも可能との事で、1度お話を兼ねて伺いたいのですが、来月から異動先になる事と看護師業務と併用に機能訓練の方もする事となりまして、やはりWワークが困難となりました。またご縁や機会がありましたらその時に再度お受けしたいと思っております。大変申し訳ございませんが、この度は辞退させていただきます。考慮して頂いたのにすみませんでした。ありがとうございました。失礼致します。
- date: '2026-04-01'
  label: 通常
  role: company
  text: 世良様、ご丁寧にお返事いただきありがとうございます。お仕事事情に変化があられたのですね。いつでもお話は受け付けておりますのでまた機会があればご検討ください。引き続きよろしくお願いいたします。
