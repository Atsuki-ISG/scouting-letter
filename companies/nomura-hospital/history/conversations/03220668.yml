  text: はじめまして。突然のご連絡大変失礼いたします、医療法人天秋会 野村病院の採用担当と申します。この度は、ご経歴を拝見し、当院の『病棟看護師（パート）』のキャリアをご検討いただきたく、ご連絡いたしました。患者様一人ひとりに寄り添った精神科医療を実践する私たちの病院で、これまでの看護師としてのご経験をぜひ活かしていただきたいと思い、ご連絡いたしました。一度お話しできましたら嬉しく思います。これまでのご経験は、地域に根差した当院が目指す「地域の皆様に寄り添う精神科医療」において、重要な役割を担っていただけると感じております。現在、野村病院では、山口県下関市でご勤務いただける病棟看護師（パート）を募集しております。当院は、スタッフが安心して働けるよう、事前の「院内見学・説明会」を積極的に受け入れており、ご希望の方には入職後のミスマッチを防ぐための簡易的な業務体験の機会もご用意しています。＜募集要項概要＞雇用形態：パート・バイト仕事内容：精神科病棟における看護業務全般（患者様の日々の体調管理、服薬管理、日常生活援助や対話を通じたケアなどを行っていただきます。）給与：時給 1,350円 〜 1,400円通勤手当あり（上限20,000円/月）賞与あり特徴：☆ 精神科未経験・ブランクOK！現場のスタッフがしっかりサポートします☆ 週2日から勤務OK！ご都合に合わせた柔軟な働き方が可能です☆ 日勤のみも相談可！ライフスタイルに合わせた勤務形態をご相談いただけます☆ 車通勤可（駐車場有）☆ 残業ほぼなし勤務時間：・日勤：8:00～17:00（休憩60分）・遅番：9:30～18:30（休憩60分）※時間外ほぼなし勤務地：・〒759-6604 山口県下関市大字横野1038-1・JR山陰本線「安岡駅」または「福江駅」（徒歩18分）ご興味をお持ちいただけましたら、当院のより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（まずは見学だけ、またはカジュアル面談からといったご希望も大歓迎です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。医療法人天秋会 野村病院 採用担当
