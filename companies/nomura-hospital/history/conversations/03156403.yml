  text: この度はスカウトをいただきましてありがとうございす。前に精神科で夜勤専従をしていました。家から遠いので働けるなら夜勤専従かなと思いますが、今は遠いもので踏ん切りがつきません。踏ん切りが、付いたときにタイミングが合えば面接させて頂ければと思いますのでよろしくお願い致します。
