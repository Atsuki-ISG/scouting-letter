  text: はじめまして。山口県下関市 野村病院の採用担当です。プロフィールを拝見して、ぜひ直接会ってお話したいと思いスカウトをお送りさせていただきました。現在、野村病院では看護師/准看護師としてご活躍いただける方を募集しています。もしよろしければ見学を兼ねて面接にお越しいただけませんか？【募集内容】募集職種    看護師/准看護師正職員　月給170,000円〜220,000円住所　山口県下関市横野町1038-1アクセス　JR山陰本線(益田〜下関) 安岡駅から徒歩で18分JR山陰本線(益田〜下関) 福江駅から徒歩で18分特徴　未経験可、精神科・心療内科、一般病院、病棟、ブランク可、日勤のみ可、夜勤専従あり、2交替制、社会保険完備、車通勤可、准看護師可、育児支援あり、残業ほぼなし、ボーナス・賞与あり、交通費支給、年齢不問、新卒可、退職金あり、住宅手当、学歴不問、40代活躍、50代活躍、60代活躍、WEB面接可、主夫・主婦OK少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
- date: '2026-04-17'
  label: 応募
  role: candidate
  text: この度はスカウトをいただきましてありがとうございます。私は現在67歳です。正規の雇用では無いと思いますが、パートや嘱託となりますでしょうか？その際は時給等をお知らせ頂けると有り難く存じます。よろしくお願いします。
- date: '2026-04-17'
  label: 通常
  role: company
  text: 金丸様、ご丁寧にご連絡をいただきありがとうございます。金丸様のご経歴を拝見いたしましたが、准看護師さん・正看護師さん両方のご経験を積まれている点を拝見し、ぜひ正規雇用、パートの両方での勤務形態をご提案できると考えております。パートの場合は時給1,350-1,400円程度で提示させていただくケースが多くなっております。もし正規雇用あるいはパートでご検討をいただけるようでしたら一度お話をお伺いし細かい勤務条件のご提示ができると考えております。
- date: '2026-04-17'
  label: 通常
  role: candidate
  text: お忙しい中、ご対応頂き誠にありがとうごさいます。65歳を過ぎているにも関わらず正規雇用の道もご検討頂けるとの事で魅力を感じております。ただ、現在就業中であります（嘱託、時期1850円）ので直ぐにご期待に添えるかどうかはお返事致しかねます。早急な求人希望でございましたら、お役に立てないかもしれませんのでご迷惑をおかけする前にご辞退させて頂こうかと思っております。よろしくお願いします。
- date: '2026-04-17'
  label: 通常
  role: company
  text: 金丸様、お返事をいただきありがとうございます。今すぐのご入職ではなくとも、金丸様のペースでぜひご検討ください。院内見学やお話を聞くだけでも、受け付けております。無理にお誘いすることはございませんのでよろしければご検討ください。(オンラインでも受け付けています)
- date: '2026-04-17'
  label: 通常
  role: candidate
  text: ご対応ありがとうごさいます。猶予を頂けるとのご配慮に大変恐縮致します。暫く考えさせて頂いた後、改めてお返事させて頂ければ有難く存じます。お手数をおかけしました事を申し訳無く思います事と共にお忙しい中ご対応頂きました事に感謝申し上げます。ありがとうごさいました。
- date: '2026-04-17'
  label: 通常
