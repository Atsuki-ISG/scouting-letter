  text: 金丸様、早速お返事ありがとうございます！ご家庭や現職のご都合もあられるかと思いますのでゆっくりご検討ください。ダブルワークや院内見学もいつでも受け付けていますので、いつでもお気軽にご連絡ください。条件面のご質問もあられれば、こちらに簡単な文面で構いませんのでお寄せいただけますと幸いです。
