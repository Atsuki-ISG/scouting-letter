  text: 野村病院の採用担当です。当求人へご応募いただき、誠にありがとうございました。佐野 万紀子様のご経歴を拝見し、ぜひ一度お会いしたいと思い、ご連絡させていただきました。早速ではございますが、ご希望の面接日程をご選択いただければと存じます。※面接は1時間程度を予定しております。もしご都合が悪い場合は、お手数ですがメッセージでお知らせください。お忙しい中大変恐縮ですが、ご返信を心よりお待ちしております。どうぞよろしくお願い申し上げます。
