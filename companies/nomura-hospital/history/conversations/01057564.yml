- date: '2026-03-04'
  label: スカウト
  role: company
  text: はじめまして。山口県下関市 野村病院の採用担当です。プロフィールを拝見して、ぜひ直接会ってお話したいと思いスカウトをお送りさせていただきました。現在、野村病院では管理栄養士/栄養士としてご活躍いただける方を募集しています。もしよろしければ見学を兼ねて面接にお越しいただけませんか？【募集内容】募集職種    管理栄養士/栄養士契約職員　月給200,000円〜290,000円住所　山口県下関市横野町1038-1アクセス　JR山陰本線(益田〜下関) 安岡駅から徒歩で18分JR山陰本線(益田〜下関) 福江駅から徒歩で18分特徴　未経験可、一般病院、社会保険完備、車通勤可、週休2日、育児支援あり、残業ほぼなし、ボーナス・賞与あり、交通費支給、年齢不問、新卒可、退職金あり、学歴不問、8時以降出社少しでもこの募集に興味を持っていただけたなら、返信種別で「このスカウトに応募する」を選びご返信ください。またご不明点などがございましたらお気軽にお問い合わせください。お返事を心よりお待ちしております。
- date: '2026-03-05'
  label: 応募
  role: candidate
  text: この度は、ジョブメドレーの求人広告を見て応募いたしました。宜しければ、面接の機会をいただけましたら幸いです。ご多忙の所恐縮ですが、どうぞよろしくお願い致します。■応募勤務形態 契約職員■資格 管理栄養士,栄養士
