  text: アーク訪問看護ステーション黒木様田村と申します。この度はご連絡くださりありがとうございます。返信が遅くなってしまい、申し訳ありません。ホームページ等をみて、素敵な取り組みをされている事業所だなと感じました。私の方は現在、期間の決まった業務委託の仕事に従事しております。そのため、もし人員の補充をお急ぎでしたら、お役に立てない可能性がかなり高いです。それでもよければ、ぜひ一度お話を伺いたく思いましたのでご連絡させていただきました。どうぞよろしくお願いいたします。
