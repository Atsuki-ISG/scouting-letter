messages: 
- date: "2025-11-23"
  role: "company"
  text: "はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として長らくご活躍され、その専門性を深めてこられた点に感銘を受けました。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一"
- date: "2025-11-23"
  role: "candidate"
  text: "採用担当さまこの度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。因みに、オンコール対応について有りなのか無しなのか、何日くらい持つのか等、知りたいです。お忙しい中恐縮ですが、どうかよろしくお願いいたします。小原"
- date: "2025-11-23"
  role: "company"
  text: "小原 奏子 様アーク訪問看護ステーション黒木です。ご返信いただきまして、誠にありがとうございます。オンコール対応はございまして、回数としては月7回弱です。面談に関しては、下記の日程で調整させていただければと思います。2025年12月03日(水) 15:00小原様がよろしければ、対面にて見学も兼ねてお話をさせていただきたく存じますが、いかがでしょうか？もしご都合が悪い場合には、事前にご連絡いただければ改めて調整させていただきます。その他ご不明点、ご質問などございましたらお気軽にお問い合わせください。当日お会いできることを楽しみにしております。どうぞよろしくお願い申し上げます。"
- date: "2025-11-23"
  role: "candidate"
  text: "採用担当さまお返事ありがとうございます。少し希望と異なりましたので、申し訳ありませんが、今回は見送りさせて頂きたく思います。お手数お掛け致しました。小原"
- date: "2025-11-23"
  role: "company"
  text: "ご返信いただき、ありがとうございます。ちなみに、オンコール対応何回ほどでしたら、働きやすい環境でしたか？働くスタッフの一人ひとりのご希望に可能な限り寄り添えたらと思っています。お忙しい中恐縮ですが、ご教示いただけますと幸いです。よろしくお願いいたします。"
