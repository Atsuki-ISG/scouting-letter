  text: この度はスカウトをいただきましてございます。返信にお時間いただき申し訳ございません。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。当方、自動車免許を取得しておらず、訪問看護ステーションへの応募は困難だと考えていたのですが可能でしょうか。いずれは取得する予定です。
