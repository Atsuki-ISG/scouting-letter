  text: 河越 あやか 様ご返信いただき、誠にありがとうございます。また、ご連絡が遅くなり、大変申し訳ありません。訪問に行くときの車は事業所のものをご利用いただけます。ゆっくり考えていただいても大丈夫ですし、まずはオンラインでざっくばらんにお話しをすることも可能です。面談可能な日程候補をお知らせいたしますので、もし河越様がよろしければ、日程調整いただけますと幸いです。4/1 (水) 9:00〜10:30,16:30〜19:004/2 (木) 9:00〜13:00,16:30〜19:004/3 (金) 9:00〜13:00,14:30〜19:00お忙しい中恐縮ですが、ご検討いただけますと幸いです。どうぞよろしくお願いいたします。
