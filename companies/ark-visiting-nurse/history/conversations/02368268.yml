  text: "この度はスカウトをいただきましてありがとうございます。施設内の訪問看護でしたら、是非応募させて頂きたいと思いましたが、在宅への移動は自信がないのです。申し訳ありません🙇‍♀️🙇‍♀️"
- date: "2026-01-09"
