  text: "この度は、お忙しい中ご返信をいただき誠にありがとうございます。 また、弊社の求人にご関心をお寄せいただけましたこと、心より感謝申し上げます。移動に関するご不安について、率直にお聞かせいただきありがとうございます。 せっかくのお申し出で心苦しいのですが、弊社の訪問看護は個人宅への訪問がメインとなっており、あいにく現時点では施設内のみの訪問看護は行っておりません。服部様のご希望に添えず、大変申し訳ございません。 また別の形でのご縁がございましたら、その際はどうぞよろしくお願い申し上げます。"
