  text: "この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。応募に際しまして、以下の点について質問させていただきたいと存じます。【質問内容】オンコールの回数と、訪問ルート地域をお伺い出来ればと思っております。お忙しいところ恐れ入りますが、ご確認のほど何卒よろしくお願いいたします。"
