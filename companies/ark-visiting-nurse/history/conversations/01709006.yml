messages: 
- date: "2026-02-13"
  role: "company"
  text: "はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。プロフィールを拝見し、公立病院や小規模多機能居宅施設でのご経験に注目いたしました。自己PRに記載いただいた「個別の関わりを活かせる職場」という想いは、当ステーションが大切にしている「対話と個性を重視した看護」と重なるものがあり、ぜひお話を伺いたいと感じました。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 時給1,500円 〜 2,000円特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一"
- date: "2026-02-14"
  role: "candidate"
  text: "この度はスカウトをいただきましてありがとうございます。ぜひ一度お話を伺いたく思いますのでご連絡させていただきました。どうぞよろしくお願いいたします。"
- date: "2026-02-14"
  role: "company"
  text: "春本 優子 様お世話になっております。アーク訪問看護ステーションの黒木でございます。この度は、ご返信いただき、誠にありがとうございます。オンライン （Google Meet） にて相互理解を目的とした面談及び、キャリアのご提案をさせていただきたく存じます。お手数ですが、下記のURLよりご希望の日程をお選びいただくことは可能でしょうか。日程調整はこちら▼https://timerex.net/s/20251101/4bf3af3d対面での面談も可能でございますので、ご希望ございましたら、お気軽にご相談ください。お忙しい中恐縮ですが、ご対応いただけますと幸いです。何卒よろしくお願い申し上げます。"
- date: "2026-02-14"
  role: "candidate"
  text: "先ほどは応募するというボタンを先走って押してしまったのですが、この度はスカウトいただきありがとうございます。6月末まで職業訓練受講中で今すぐの就職は出来かねますが7月以降でも応募は可能でしょうか？アーク訪問看護ステーション様の『訪問看護師 - 面談確約 - 』のキャリアというのは何でしょうか？また、時給の表示がありましたがアルバイトの募集スカウトでしょうか？いろいろ質問して申し訳ございません、宜しくお願い致します。"
- date: "2026-02-14"
  role: "company"
  text: "春本 優子 様ご返信いただき、誠にありがとうございます。「応募する」ボタンの件、承知いたしました。弊社の求人に興味をお持ちいただき、積極的にアクションをいただけたことを大変嬉しく思っております。ご質問いただいた点について、以下の通り回答させていただきます。1. 入職時期について（7月以降の応募）全く問題ございません。現在、職業訓練を受講中とのこと、看護のスキルアップに励まれている姿勢を心強く感じております。弊社では、候補者様の状況に合わせた入職時期の調整を柔軟に行っておりますので、7月からのスタートを前提に、まずは面談を進めさせていただけますと幸いです。2. 「面談確約」と「キャリア」についてスカウト名にある「面談確約」とは、春本様のこれまでのご経歴を拝見し、書類選考を免除してぜひ直接お話ししたい、という弊社からの期待を込めた優待枠でございます。また「キャリア」という表記は、訪問看護師としての専門性を高めていく道があることを示しております。3. 雇用形態について（正社員・アルバイト）時給の表示により混乱を招いてしまい失礼いたしました。弊社では現在、正社員の募集も積極的に行っております。 今回のスカウトは正社員・アルバイトに関わらず、春本様のようなお力をお持ちの方にお声がけしておりますので、正社員でのご応募も大歓迎です。もしよろしければ、まずは一度オンライン、または事業所にてカジュアルにお話ししてみませんか？日程調整はこちら▼https://timerex.net/s/20251101/4bf3af3d訓練中のお忙しい時期かと存じますが、東本様のご都合の良い日程をいくつかいただけますと幸いです。お返事を心よりお待ちしております。"
- date: "2026-02-14"
  role: "candidate"
  text: "お返事ありがとうございます、内容確認いたしました。職業訓練が琴似のポリテクセンターですので授業終了後伺いたいと思います。16〜の枠で都合の良い日が直近ですと3月6日でしたのでその日に16〜17時枠で予約させていただきました。よろしくお願い致します。"
- date: "2026-02-16"
  role: "company"
  text: "春本 優子 様アーク訪問看護ステーション黒木です。日程調整いただきまして、誠にありがとうございます。下記の日程で調整が完了しておりますので、ご確認いただけますと幸いです。3月6日 (金) 16:00 - 17:00その他、ご質問やご不明な点がございましたら、お気軽にご相談ください。当日は春本様とお話しできることを楽しみにしております。引き続き、よろしくお願い申し上げます。"
- date: "2026-02-16"
  role: "candidate"
  text: "お忙しい中お時間いただきありがとうございます、よろしくお願い致します。"
