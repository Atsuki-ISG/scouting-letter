  text: "この度は、ジョブメドレーの求人広告を見て応募いたしました。宜しければ、面接の機会をいただけましたら幸いです。ご多忙の所恐縮ですが、どうぞよろしくお願い致します。■応募勤務形態 正職員■資格 看護師,自動車運転免許"
