  text: "いしい様お世話になっております。日程の調整を検討いただき、誠にありがとうございます。下記の日程で確定とさせていただければと思います。1/28 (水) 13:00〜14:00当日は下記の住所までお越しください。西区八軒四条東1丁目2番10号 條野ビル205号室いしい様にお会いできることを楽しみにしております。よろしくお願いいたします。"
- date: "2026-01-20"
