messages: 
- date: "2025-11-23"
  role: "company"
  text: "はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として10年以上ご活躍され、その専門性を深めてこられた点に感銘を受けました。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一"
- date: "2025-11-24"
  role: "candidate"
  text: "この度はスカウトをいただきましてありがとうございます。転職を考え始めていた中で、元々訪問看護に興味があったなかで偶然に貴施設のページを拝見しまして、とても興味を持ちぜひ一度お話を伺いたく思いました。しかし、今現在、在職中であり、転職の時期をまだ具体的に決めていないため、応募に際しまして、以下の点について質問させていただきたいと存じます。【質問内容】転職の時期を考慮していただくことは可能でしょうか？（今すぐではなく早くても3ヶ月後以降になるため）また、下に小学校2年生の子供がいます。土日勤務や夜間なども勤務できますが、行事休みなども平日に希望したいのですが、休みなど希望が出せるものか、気になりました。お忙しいところ恐れ入りますが、ご確認のほど何卒よろしくお願いいたします。"
- date: "2025-11-24"
  role: "company"
  text: "篠木 尚見 様ご返信いただき、誠にありがとうございます。お話の機会を頂戴できますこと、大変嬉しく思います。①転職の時期を考慮していただくことは可能でしょうか？（今すぐではなく早くても3ヶ月後以降になるため）▶︎4月頃でございましたら、当初予定をしていた時期ですので、可能でございます。②行事休みなども平日に希望したいのですが、休みなど希望が出せるものでしょうか？▶︎その他のスタッフのお休みの希望状況によりますが、基本的には調整可能でございます。他にも小学生のお子さんがいらっしゃる方がいますで、お互い助け合い・サポートし合いながらシフトを調整させていただいています。つきましては、篠木様のご都合のいい日程をいくつか頂戴することは可能でしょうか？オンラインもしくは対面のどちらでも調整が可能ですので、ご希望の面談方法がございましたら併せてご教示ください。お忙しい中恐縮ですが、ご返信いただけますと幸いです。引き続きよろしくお願い申し上げます。"
- date: "2025-11-26"
  role: "candidate"
  text: "お返事遅くなりすみません。転職は必ずしようと思ってまして、貴施設についても物凄く魅力的でぜひ具体的な仕事内容や休日面など色々知りたいことが沢山あるのですが、実は私事なのですが、長女が4月後半に第一子を出産予定でありまして、4月の転職ですと有給はゼロからのスタートで、お休みの都合もつけることが厳しいだろうなぁ、など時間的に色々と難しいのかな、、と考えていました。せっかくのお話をいただきとても嬉しかったのですが、色々と考え抜いた結果、来年の夏頃がタイミングかなと思いました。その頃にもし募集していましたら次の機会にお願いしてもよろしいでしょうか？"
- date: "2025-11-26"
  role: "company"
  text: "お子様の出産が控えておられるのですね！おめでたいことでございますね。中長期的な目線でも構いませんので、篠木様がよろしければ、一度オンラインでお話しの機会を頂けませんか？違ったら違ったで早めの方がいいですし、もしかしたらよりよいキャリアや選択肢のご提案ができるかもしれません。私も子どもがいますので、ざっくばらんにお話しができると嬉しく思います。ご検討いただけますと幸いです。"
- date: "2025-11-26"
  role: "candidate"
  text: "昨夜は遅い時間に大変失礼しました。そして暖かいお言葉をありがとうございます！中長期的な目線でもよろしければぜひお話をお伺いしたいです。面談可能な日時ですと、28日、12月5日、8日あたりです。28日や8日は午前、午後とも時間空いてます。5日はお昼前後あたりは可能です。　オンラインでの面談はzoomとかでしょうか？やってみたことがないためお手数お掛けしますが教えていただければ幸いです。あとはもし良ければ、住所がとても近く徒歩圏内なのでそちらにお伺いさせていただくことも可能です。どちらでも大丈夫ですのでよろしくお願い致します。"
- date: "2025-11-26"
  role: "company"
  text: "お時間いただけること、大変嬉しく思います。早速ではございますが、下記の日程でご調整させていただいてもよろしいでしょうか。11/28 (金) 11:00〜ステーションの雰囲気も見ていただきたいので、ご負担でなければぜひご来社いただけますと幸いです。引き続き、よろしくお願い申し上げます。"
- date: "2025-11-26"
  role: "candidate"
  text: "28日11時からで承知しました。お時間いただきありがとうございます。当日よろしくお願い致します。"
- date: "2025-11-26"
  role: "company"
  text: "篠木様日程調整いただき、誠にありがとうございます。下記の日程と場所で調整させていただきました。日　程：11/28 (金) 11:00〜場　所：アーク訪問看護ステーション住　所：北海道札幌市西区八軒四条東1丁目2-10 條野ビル205号室持ち物：なし徒歩圏内とのことでしたが、もし自家用車で来られる際は来客用の駐車場がございますので、お気軽にご利用くださいませ。当日は篠木様にお会いできることを楽しみにしております。何卒よろしくお願い申し上げます。"
- date: "2025-11-26"
  role: "candidate"
  text: "日程調整いただきありがとうございます。では自家用車で行こうかと思います。駐車場はどこに停めていいのでしょうか？マンションの一階にあじさい保育園や理髪店などの店舗が入っていますが、道路沿いの駐車スペースで、指定の場所はありますか？"
- date: "2025-11-27"
  role: "company"
  text: "ご質問いただき、ありがとうございます！北海道札幌市西区八軒四条東1丁目2-10 條野ビル205号室の左側にございます、住民用の駐車場の方に来客用の駐車場がございます。少しわかりづらい気もしており、もしご不安でしたら、メールアドレスをご教示いただけましたら、写真で画像でお送りすることも可能でございます。引き続き、よろしくお願いいたします。"
