- date: '2026-03-17'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。整形外科の急性期から回復期まで、10年以上にわたり幅広い病棟でご活躍されてきたご経歴を心強く拝見しました。培われたアセスメント力とチーム連携のご経験は、クリニック併設で医師と密に連携しながら取り組む当ステーションで大きな力になると考えております。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。6月以降での増員を検討しており、3〜5月での採用は検討していない点、ご留意くださいませ。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一
- date: '2026-03-18'
  label: 応募
  role: candidate
  text: アーク訪問看護ステーション黒木 慎一 様​はじめまして、看護師の柏木と申します。この度は、大変温かいスカウトのメッセージをいただき、本当にありがとうございます。​現在は回復期リハビリテーション病棟で勤務しており、患者様の「家に帰る」をお手伝いすることに、日々やりがいと、叶えられない戸惑いの板挟みの毎日を感じております。その中で、さらに一歩踏み込んで、地域での生活を支える訪問看護にも強く惹かれるようになりました。​ぜひ一度、お話を伺う機会をいただければ幸いです。ただ、訪問看護の世界は初めてですので、いくつか正直に不安な点もご相談させてください。​移動と操作のこと： 現在、自家用車を所有していないのですが、その場合の訪問方法や、もしオンコールを担当する際などの移動について、どのような工夫ができるか伺いたいです。また、看護の仕事は大好きですが、パソコン操作があまり得意ではないため、記録業務の進め方なども教えていただけますでしょうか。​オンコールのこと： 未経験からのスタートですので、どのくらいの経験を積んでから担当することになるか、また緊急時のサポート体制なども伺えると安心です。​子育てのこと： 私自身、シングルマザーで小学生の娘を育てておりまして、急な予定変更の際などのフォロー体制や、皆様の働き方もお聞きできればと思っております。​時期については、今の職場での役割も大切にしたいと考えており、6月以降での入職を視野に入れております。​お忙しいところ恐縮ですが、一度オンライン等でカジュアルに、まずはステーションの雰囲気についてお話しさせていただければ嬉しいです。​どうぞよろしくお願いいたします。
