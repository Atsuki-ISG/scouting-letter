- date: '2025-11-27'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として7年以上ご活躍され、その専門性を深めてこられた点に感銘を受けました。病院でのご勤務経験が多い点もとても素敵だと感じます。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一
- date: '2025-11-27'
  label: 応募
  role: candidate
  text: アーク訪問看護ステーション黒木様この度はご連絡いただき誠にありがとうございます。また、プロフィールをご熟読いただいた上でのスカウト大変光栄でございます。2点お伺いしたく存じます。1．臨床での経験は手術室のみのため、基本の看護技術以外に不安がございます。こちらの経歴に関して問題はございませんか。2．拝見させていただきました給与欄にて「¥300,000〜450,000」と幅が大きいようにお見受けいたしました。どのような条件下で増減するのでしょうか。以上2点に関しましてご教示いただけますと幸いです。ご多用のところ恐れ入りますが、ご確認よろしくお願い申し上げます。今井麻理奈
- date: '2025-11-27'
  label: 通常
  role: company
  text: 今井 麻理奈 様アーク訪問看護ステーション黒木でございます。ご質問いただき、誠にありがとうございます。インラインにて失礼いたします。①臨床での経験は手術室のみのため、基本の看護技術以外に不安がございます。こちらの経歴に関して問題はございませんか。→経歴に関しては、問題ございません。看護師としても大切ですが、前提として人としてという基本的な部分を重視しています。相手のホームに伺うということを理解し、しっかりと対話することで相手のニーズを把握し、人生の伴走者として、逃げないで最期まで寄り添う力を持った人を探しています。②拝見させていただきました給与欄にて「¥300,000〜450,000」と幅が大きいようにお見受けいたしました。どのような条件下で増減するのでしょうか。→給与レンジに関しまして、幅が大きくご心配をおかけし申し訳ございません。看護師としてのご経験年数や、これまでの実績・スキルを総合的に評価し、基本給を決定いたします。現在は、管理職候補の方も募集しており、役職やポジションによって変動いたします。さらにご質問等ございましたら、このままチャットでやり取りすることも可能でございます。また、オンライン （Google Meet） にて相互理解を目的とした面談及び、新たなキャリアのご提案の機会を頂戴できるようでしたら、下記のURLより日程のご調整を頂けますと幸いです。日程調整はこちら▼https://timerex.net/s/20251101/e6fdc9dcその他、ご質問やご不明な点がございましたら、お気軽にご相談ください。引き続き、何卒よろしくお願い申し上げます。
