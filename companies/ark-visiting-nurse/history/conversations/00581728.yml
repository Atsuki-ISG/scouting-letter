  text: この度はスカウトをいただきましてありがとうございます。精神訪問看護、ホスピス経験を活かし3月から施設外部訪問看護立ち上げに携わっております。貴社のスカウトからインスタ拝見させていただき、素敵なステーション、ご利用様への思いが伝わりました。ご返信が大変遅くなり申し訳ございません。　　　　　　　　　　　　　　　　　　　　　　　　　　　伊藤　ひかり
- date: '2026-04-21'
  label: 通常
  role: company
  text: お世話になっております。アーク訪問看護ステーションの黒木です。この度はご丁寧にご返信をいただき、誠にありがとうございます。また、当ステーションの取り組みや想いに関心をお寄せいただき、大変嬉しく拝読いたしました。これまでのご経験と今のお取り組みから、伊藤様のご活躍の幅広さと熱意が伝わってまいりました。新たな環境でご尽力されていることと存じますが、今後ますますご活躍されることを心よりお祈り申し上げます。またご縁がございました際には、ぜひお話しさせていただければ幸いです。
