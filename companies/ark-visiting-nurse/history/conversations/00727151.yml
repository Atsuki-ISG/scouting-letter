messages: 
- date: "2025-12-18"
  role: "company"
  text: "はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。海外で生活をされていたご経験があられるのですね。日常英会話ができる点が素敵だと感じます。これまでのご経験は、地域に根差した当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一"
- date: "2025-12-18"
  role: "candidate"
  text: "アーク訪問看護ステーション 黒木 慎一様この度はスカウトをいただきましてありがとうございます。ヘンシャ理紗子と申します。また、当方の経歴を確認をしていただきありがとうございます。話は反れてしまいますが、海外での生活を活かし日常でも英語を使ってインバウンドで札幌へ来てくださっている方を通訳でお手伝いすることも多いです。（列車が運休になったとか、迷っている方に声をかけてしまう所謂おせっかいです）現在は大学において臨床実習のインストラクターをメインに勤務しております。学生への指導は学ぶことが多くあり、どのように伝えると学生の今後に役立つことが出来るのかを考えながら、精神・基礎・成人・老年などの分野でインストラクターをしております。当方の勝手な事情をお伝えしますと・・ひとり親家庭であること、また、発達しょうがいと呼ばれる子ども（中学１年、小学５年生）を育てているため、フルタイムでの勤務が出来ない状況にございます。フルタイムでのスカウトでございましたら、大変申し訳ございません。先ほどＦＢにて御社のページをフォローさせて頂きました。お写真を拝見させていただきましたが、とても笑顔があふれる素敵なステーションだと感じております。カフェなども行っていらっしゃるのは、プライマリケア視点でも本当に大切なことだと認識しております。ご迷惑でなければ、ステーションにて何か関わらせて頂きたいのです。しかしながら、実習になると2週間ずつの勤務になりますので当方としましても、御社へ面談をお願いいたします！とは申し上げにくい状況でございます。このような状況においても何かご縁を頂戴できるのでございましたら、非常に嬉しく思っております。長文乱文にて失礼いたしました。ヘンシャ理紗子　拝"
