- date: '2026-02-17'
  label: スカウト
  role: company
  text: はじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。プロフィールを拝見し、看護師として10年以上にわたり培われた確かな実践力と専門性に注目しました。その豊富なご経験は、地域に根ざした当事業所において利用者様への質の高いケアに直結すると確信しております。ぜひ即戦力としてお力添えをいただければと願っております。これまでのご経験は、地域に根ざした当訪問看護ステーションが目指す「地域の皆様に寄り添う訪問看護」において、重要な役割を担っていただけると感じております。現在、アーク訪問看護ステーションでは、札幌市西区でご勤務いただける看護師を募集しております。訪問範囲は、西区、手稲区、中央区、北区が主でございます。当看護ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供します。＜募集要項概要＞仕事内容 ：・訪問看護業務全般（患者様宅を訪問し、体調管理、服薬管理、医療機器管理、日常生活援助、リハビリテーション、ターミナルケア、緩和ケアなどを行っていただきます。）お客様の特徴：・認知症の方、足腰が弱ってしまい通院が大変な方、退院したばかりで日々の生活に不安を感じている方、がんと診断され自宅で過ごしたいと考えている方、神経難病をお持ちの方など給与： 月給 300,000円 〜 450,000円 *各種手当含む特徴：☆ 成長環境◎充実した研修制度・費用補助あり☆ 賞与・昇給あり！各種手当充実！退職金制度あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応◎☆ Wワーク・ブランクOK！育休産休の取得実績あり！☆ クリニックに併設しており、営業ノルマなし！☆ 福利厚生◎年末年始休暇あり！残業ほぼなし！☆ インフルエンザ予防接種補助あり！職員の健康維持への配慮あり☆ 併設クリニックでの医療費は自己負担分の全額還付あり！☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎勤務時間：・正社員　8：30～17：30（休憩60分）*相談可能教育体制・研修☆ セミナーや研修の費用負担（研修費用年間50,000円）☆ S-QUE訪問看護eラーニング導入☆ 入社初日から新任研修制度あり勤務地：・〒063-0864・北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一
- date: '2026-02-18'
  label: 応募
  role: candidate
  text: 医療法人社団優希アーク訪問看護ステーション黒木 慎一 様はじめまして。この度は、私の経歴をご覧いただき、またご丁寧なスカウトのご連絡をいただきまして、誠にありがとうございます。求人内容や貴ステーションのWebサイト等も拝見し、地域に根ざした訪問看護を大切にされている点や、働き方への柔軟な配慮など、大変魅力的な職場であると感じております。現在、他施設の求人に1件応募しており、2月26日に面談を予定しておりますが、条件面や働き方の観点から、貴ステーションのお話もぜひ一度お伺いしたいと考えております。もしご都合がよろしければ、お話させていただくお時間を頂戴できましたら幸いです。（オンラインカジュアル面談でも大丈夫です）ご多忙のところ恐れ入りますが、ご検討のほど、何卒よろしくお願い申し上げます。
