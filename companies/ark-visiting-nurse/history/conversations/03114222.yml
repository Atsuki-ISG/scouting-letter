  text: 野口　いずみ 様お世話になっております。先日はお忙しい中、面接のためご来所いただき誠にありがとうございました。また、選考結果についてご連絡をいただきありがとうございます。あの後、現在勤務しているパート職員より勤務日の増回の申し出がありました。そのため、先日お話しさせていただいた通り、2月入職の職員枠とパート職員の勤務枠を調整する必要が生じております。そのような状況となり、現時点では6月入職のお約束をすることが難しい状況となってしまいました。お忙しい中お時間を作って面接にお越しいただいたにもかかわらず、このようなご連絡となりましたことを申し訳なく思っております。また機会があり、募集を再開する際にはこちらからご連絡させていただければと思います。野口様の今後のご活躍を心よりお祈り申し上げます。アーク訪問看護ステーション黒木　慎一
