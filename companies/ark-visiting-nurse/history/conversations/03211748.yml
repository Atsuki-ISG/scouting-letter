  text: 【札幌市西区｜認知症ケア・がん認定看護師2名が現場指導】併設クリニック医療費全額還付／退職金・研修費年5万円補助／残業ほぼなしはじめまして。突然のご連絡大変失礼いたします、アーク訪問看護ステーションの黒木と申します。この度は、ご経歴を拝見し、アーク訪問看護ステーションの『訪問看護師（正社員） - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。10年以上にわたり看護師としてご活躍されてきたご経歴に、強く惹かれました。豊富な臨床経験で培われた確かな技術とアセスメント力は、認知症の利用者様が多く、きめ細かなケアが求められる私たちの訪問看護で大きな力になっていただけると感じています。ぜひ一度お話しできましたら嬉しく思います。訪問看護で何より大切なのは、利用者様の変化にそっと気づき、寄り添える力だと感じています。認知症の利用者様が多く、在宅での看取りにも向き合う現場だからこそ、「対話と個性を大切に」という姿勢で、仲間と一緒に育ててきました。＜募集要項概要＞仕事内容・訪問看護業務全般（体調・服薬・医療機器管理、日常生活援助、リハビリ、ターミナル・緩和ケア）・利用者像：認知症・通院困難・退院直後・がん在宅療養・神経難病など・併設クリニックと連携した医療対応、営業ノルマなし給与・月給：300,000円〜450,000円（各種手当含む／近隣エリアでトップ水準）・賞与・昇給あり／退職金制度あり／各種手当充実勤務時間・8:30〜17:30（休憩60分）※相談可能／残業ほぼなし休日・年末年始休暇あり／育休産休取得実績あり福利厚生・各種社会保険完備・併設クリニックでの医療費 自己負担分全額還付（独自制度）・インフルエンザ予防接種補助／再雇用制度あり教育体制・研修費用年50,000円補助／S-QUE訪問看護eラーニング導入・認知症ケア認定看護師・がん看護認定看護師が現場指導・入社初日から新任研修制度あり所在地：北海道札幌市西区八軒4条東1丁目2−10 條野ビル205号室訪問範囲：札幌市西区・手稲区・北区・中央区（東区・豊平区）ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンライン可）なお、6月以降での増員を検討しており、3〜5月での採用は予定していない点ご留意くださいませ。ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。アーク訪問看護ステーション 黒木 慎一
