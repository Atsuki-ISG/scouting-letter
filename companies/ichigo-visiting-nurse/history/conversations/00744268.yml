  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師・准看護師としてのご経験に加え、看護助手としても現場経験を積まれてきた点に感銘を受けました。ご経験は1年未満とのことですが、医療現場の流れを理解しながら一つひとつ着実に経験を積まれている姿勢がとても素敵だと感じます。また、埼玉県草加市にお住まいで、埼玉県内の幅広いエリアに加えて東京都内（世田谷区・港区・大田区・足立区・豊島区・新宿区・練馬区など）でもご勤務先をご検討されているとのこと、生活や通勤の選択肢を広く持ちながらご自身に合う環境を探されている点が印象的です。勤務地候補に東京都練馬区も含まれており、当ステーションの募集エリアとも合致しています。現在は離職中とのことですので、働き方や環境面も含めて無理なく再スタートできる職場をご提案できればと思っております。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると思います。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。訪問範囲は、練馬区、杉並区の一部。おおむね事業所より半径3㎞圏内でございます。（一部例外有）東京都練馬区をご希望の方にも検討いただきやすいエリアですので、ぜひ候補の一つとしてご覧いただければと思います。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。訪問が初めての方でも、同行訪問・オンライン研修などのサポート体制がございます。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど)・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与： 350,000円〜458,000円特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育てママ多数活躍中！急な休みでも嫌な顔をしないフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員　9：00～18：00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社・東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401・東京事務所：東京都中央区八丁堀4-10-8-501・富士見台サテライト：東京都練馬区貫井3-31-15 スズキビル１B重度特化住宅型有料老人ホーム いちごの里各種SNSで社員や職場の情報を発信中：・インスタグラム：＠ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション　柳田顕 インタビューのどちらかを検索・インスタをフォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、入職時期・働き方（正職員/パートなど）のご希望について、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
