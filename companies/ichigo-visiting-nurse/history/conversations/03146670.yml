  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。循環器内科の急性期病院でのご勤務経験に加え、その後も循環器内科で継続してご勤務されている点に惹かれました。循環器領域は状態変化が早く、観察力と判断力が求められるため、現場で培われた対応力は在宅の現場でも大きな強みになると感じます。また、埼玉県比企郡滑川町にお住まいで、埼玉県内や東京都内（板橋区など）で勤務先をご検討されているとのこと、生活圏に合わせて無理なく働ける環境を探されている点が印象的です。入職時期も「3か月以内」とのことでしたので、まずは早めにカジュアルにお話できればと思っております。年収600万円以上のご希望もあり、条件面も含めて現実的にすり合わせができればと思います。当ステーションは東京都練馬区が勤務地となり、訪問範囲は練馬区、杉並区の一部（おおむね事業所より半径3km圏内）です。板橋区をご検討されている方は比較的通勤しやすいエリアですので、訪問看護という働き方も候補に入れていただける場合は、ぜひ一度お話できればと思います。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：350,000円〜458,000円特徴：☆ 看護師とリハビリ職が半々、20〜30代が活躍☆ 子育て中のスタッフも多く、フォローし合う雰囲気☆ 同行訪問、オンライン研修あり☆ 年間休日125日、残業ほぼなし勤務時間：・正社員 9:00〜18:00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、入職時期・働き方のご希望（年収感も含めて）について、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
