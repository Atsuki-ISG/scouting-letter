  text: この度はスカウトをいただきましてありがとうございます。経歴を細かく見ていただき、お声掛け頂いたようで、とても嬉しく思います。歓迎条件として、看護師歴3年以上とのご記載を拝見しました。私はまだ3年目の新人ですが、ご応募可能なのでしょうか。よろしくお願いいたします。
- date: '2026-04-22'
  label: 通常
  role: company
  text: 安達様ご返信ありがとうございます。いちご訪問看護リハビリテーションの柳田です。看護師3年目とのことですが、もちろん大歓迎です！募集要項に「3年以上」と記載しておりましたが、それはあくまで一つの目安に過ぎません。それ以上に、安達様がこれまで培ってこられたご経験や、これからのキャリアに対する想いを大切にしたいと考えております。弊社では、若手の看護師も一人ひとりのペースに合わせて成長できるようサポート体制を整えておりますので、その点はどうぞご安心ください。もしよろしければ、まずは選考という形ではなく、カジュアルにお話ししてみませんか？安達様の今後の展望をお伺いしたり、弊社の雰囲気を感じていただいたりする機会にできれば幸いです。以下の日程の中で、オンラインまたは対面（弊社事務所）にて30分〜1時間ほどお時間をいただけますでしょうか。・4月25日（土曜）11:00〜12:00・4月26日（日曜）10:00〜11:00・4月27日（月曜）10:00〜11:00上記以外でも、安達様のご都合に合わせて調整可能です。お忙しいところ恐縮ですが、ご検討いただけますと幸いです。何卒よろしくお願い申し上げます。
