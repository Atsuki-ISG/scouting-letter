  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの「訪問看護師 - 面談確約 - 」のキャリアをご検討いただきたく、ご連絡いたしました。これまで消化器内科・外科の急性期に加え、現在は回復期リハビリテーション領域でもご経験を積まれており、患者様の状態に応じた看護を幅広く経験されている点に強く惹かれました。バルーン挿入やルート確保、採血、マーゲンチューブ挿入などの手技にも自信をお持ちとのことで、基礎的な看護技術をしっかりと身につけられている方だと感じております。訪問看護では、ご利用者様のご自宅で状態を判断しながら看護を行うため、これまで培われた観察力や判断力、そして看護技術をそのまま活かしてご活躍いただける環境です。また、急性期と回復期の両方をご経験されていることで、より幅広いケースに対応できる点も強みになると感じております。勤務地についても板橋区をご希望されている中で、当ステーションは練馬区拠点となり、訪問範囲も半径3km圏内とコンパクトなため、比較的ご負担なくご勤務いただける環境です。現在はすぐのご転職ではなく、今後の選択肢としてご検討されているタイミングかと存じますので、まずは情報収集として一度お話しできれば幸いです。訪問看護が未経験の方でも、同行訪問やオンライン研修を通じて安心してスタートできる体制を整えておりますので、これまでのご経験を活かしながら、新たなキャリアとしてご検討いただけましたら嬉しく思います。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：350,000円〜458,000円特徴：☆ 看護師とリハビリ職が半々、20〜30代が活躍☆ 子育て中のスタッフも多く、フォローし合う雰囲気☆ 同行訪問、オンライン研修あり☆ 年間休日125日、残業ほぼなし勤務時間：・正社員 9:00〜18:00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューまずは情報収集としてのカジュアル面談でも大歓迎です。今後のキャリアの方向性についても含めて、ぜひ一度率直にお話しできれば幸いです。ご返信を心よりお待ちしております。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
