- date: '2026-02-11'
  label: スカウト
  role: company
  text: 🍓未経験歓迎🍓月給30万円〜！年間休日125日！面接確約！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として3年ご経験され、大学の看護学部をご卒業後、小児科の病院でご勤務経験を積まれてきた点に感銘を受けました。お子さまやご家族への丁寧な関わりを通じて培われたコミュニケーション力や観察力は、在宅の現場でも大きな強みになると感じます。また、愛知県小牧市にお住まいで、小牧市・春日井市エリアでのご勤務をご希望とのこと、生活圏を大切にしながら無理なく働ける環境を探されている点がとても素敵だと感じました。勤務形態も正職員だけでなくパート・バイトもご検討されており、土日祝休み、日勤のみ、育児支援など働き方の条件も重視されている点を拝見しました。入職時期も「3か月以内」とのことでしたので、まずは早めにカジュアルにお話できればと思っております。当ステーションは愛知県一宮市での募集となりますが、通勤面や働き方の希望（日勤中心、オンコール可否など）も含めて、ご希望に合わせてすり合わせが可能です。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると感じております。現在、いちご介護訪問看護ステーションでは、愛知県一宮市でご勤務いただける看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：300,000円〜458,000円（ご経験等によりご相談）特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育て世代も多数活躍中！急な休みでもフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員 9：00～18：00（休憩60分）勤務地：重度特化住宅型有料老人ホーム いちごの里・一宮事業所：愛知県一宮市奥町字野方16-1いちご介護訪問看護ステーション いちごの里：・一宮今伊勢事業所：愛知県一宮市今伊勢町馬寄字北塚本19番1号 ルナエマーレ103各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビュー検索・フォローいただくと最新情報もご覧いただけます。ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望（正職員/パート、土日祝、日勤中心など）について、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション 柳田 顕
- date: '2026-02-11'
  label: 応募
  role: candidate
  text: この度はスカウトのご連絡をいただき、誠にありがとうございます。現在の職場が名古屋で、子育てと通勤を両立することが難しく感じており、自宅近くでの転職を検討しておりました。しかし家庭の事情となってしまうのですが、先日第二子を授かっていることがわかりました。今転職させていただくと、すぐに産休へ入る形となり、ご迷惑をおかけしてしまうと思い、今回は辞退させていただきたいと考えております。訪問看護ステーションのお仕事には以前から興味があり、出産・育休後に求人がございましたら、ぜひ改めて応募させていただければと思っております。何卒よろしくお願いいたします。
- date: '2026-02-11'
  label: 通常
  role: company
  text: 苅谷 胡桃 様お世話になっております。いちご訪問看護リハビリステーションの柳田です。この度は、ご多忙の折に丁寧なご返信をいただき、誠にありがとうございました。まずは、第二子のご懐妊とのこと、心よりお祝い申し上げます。ご家族にとってかけがえのない喜びの時期に、弊社のスカウトをきっかけにキャリアについて真剣に検討してくださったこと、大変光栄に存じます。ご事情、承知いたしました。現在の苅谷様にとっては、お身体とご家族を第一に考え、穏やかに過ごされることが何より大切なことと存じます。弊社のことはどうぞお気になさらないでください。苅谷様のように、仕事と家庭の両立を真剣に考え、誠実に向き合われる方にこそ、ぜひ将来的に弊社の訪問看護を支えていただきたいと考えております。出産、そして育児が一段落された頃に、またご縁をいただけることをスタッフ一同心より願っております。数年後であっても、状況が変わりましたらぜひお気軽にご連絡ください。その際、苅谷様に最適なポジションを改めてご提案できれば幸いです。寒暖差の激しい折、どうぞお身体を大切になさってください。苅谷様の安産と、ご家族の幸せを心よりお祈り申し上げます。いちご訪問看護リハビリステーション　柳田
