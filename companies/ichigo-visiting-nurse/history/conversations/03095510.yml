  text: 【面談確約】「気になる」押していただき、ありがとうございます！未経験歓迎！時給1,800円〜！年間休日125日！見学・Web説明会実施中！はじめまして。突然のご連絡大変失礼いたします、いちご訪問看護リハビリステーションの柳田と申します。ご経歴を拝見し、いちご訪問看護リハビリステーションの『作業療法士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。作業療法士としてご活躍され、その専門性を深めてこられた点に感銘を受けました。30代で作業療法士の資格を取得されており、東京都練馬区にお住まいな点がピッタリだと感じました！これまでのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると思います。まずは「オンライン（対面も歓迎です！）でのカジュアル面談」で、ざっくばらんにお話しの機会 (30~60分) をいただけませんか？履歴書は不要です。「とりあえず職場の雰囲気だけ知りたい」という方も大歓迎です！＼ インスタグラムで社員や職場の情報を発信中 ／＠ichigohoumonkango とインスタグラムで検索し、フォローすると最新情報をGET！「まずは話を聞きたい」を押してみてください！ご返信を心よりお待ちしております。いちご訪問看護リハビリステーション 柳田 顕
