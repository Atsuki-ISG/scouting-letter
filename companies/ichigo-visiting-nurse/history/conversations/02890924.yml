  text: 【面談確約】「気になる」押していただき、ありがとうございます！経験者験歓迎！月給34.8万円〜！年間休日125日！見学・Web説明会実施中！はじめまして。突然のご連絡大変失礼いたします、いちご訪問看護リハビリステーションの柳田と申します。ご経歴を拝見し、いちご訪問看護リハビリステーションの『言語聴覚士 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。言語聴覚士として2年以上ご活躍され、その専門性を深めてこられた点に感銘を受けました。20代という若さで言語聴覚士の資格を取得されており、東京を希望勤務地に含まれている点がピッタリだと感じました！病院での経験があられる点も素敵だなと思います。これまでのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると思います。まずは「オンライン（対面も歓迎です！）でのカジュアル面談」で、ざっくばらんにお話しの機会 (30~60分) をいただけませんか？履歴書は不要です。「とりあえず職場の雰囲気だけ知りたい」という方も大歓迎です！＼ インスタグラムで社員や職場の情報を発信中 ／＠ichigohoumonkango とインスタグラムで検索し、フォローすると最新情報をGET！「まずは話を聞きたい」を押してみてください！ご返信を心よりお待ちしております。いちご訪問看護リハビリステーション 柳田 顕
