- date: '2026-01-17'
  label: スカウト
  role: company
  text: '"はじめまして。突然のご連絡大変失礼いたします、いちご訪問看護リハビリステーションの柳田と申します。この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。プロフィールを拝見し、急性期から慢性期までの病院経験を積まれ、長期にわたり看護師として現場に向き合ってこられた点に強い魅力を感じました。学生時代から「患者様の立場に立って考えること」を大切にされ、一方的な説明ではなく、信頼関係を築きながら看護を提供されてきた姿勢は、訪問看護において非常に重要な価値観だと感じています。また、救命救急・急性期のご経験に加え、現在も臨床現場で継続して勤務されていることから、状態変化への気づきや判断力、落ち着いた対応力は、在宅の現場でも即戦力として活かしていただけると考えています。訪問看護では、限られた情報の中でご利用者様の生活全体を見ながら、医師やケアマネジャー、ご家族と密に連携する場面が多くあります。これまで培われてきたコミュニケーション力や観察力を、無理なく発揮できる環境です。「まずは話を聞いてみたい」「現場の雰囲気を知りたい」といった段階でも構いません。少しでもご興味をお持ちいただけましたら、お気軽にご連絡ください。＜募集要項概要＞仕事内容 ・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与： 350,000円〜458,000円 特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 給与・休日・人間関係・やりがいなど、どれをとっても自信あり◎☆ 時短勤務可！急な休みでも嫌な顔をしないフォローし合う雰囲気あり！☆ 研修支援あり！外部研修の参加支援・定期的な社内勉強会あり◎☆ 高水準の給与体系！インセンティブだけでなく、高めに設定した基本給◎☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 子育てママ多数活躍中！急なお休みにも柔軟に対応☆ Wワーク・ブランクOK！育休・産休の取得実績あり！☆ 有給など、休みやすい雰囲気あり！チームワーク・支え合い重視◎☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！☆ 社会保険完備！インフルエンザ予防接種の補助あり◎☆ 職員同士助け合う雰囲気のあり！相談しやすい環境◎☆ 素直さ・チームワーク・柔軟性・想像力・誠実さを重視した採用☆ 訪問範囲：練馬区、杉並区の一部！事業所から半径3km圏内。*一部例外あり。☆ 2022年に創業、東京都練馬区・愛知県一宮市にステーション設置！勤務時間：・正社員　9：00～18：00（休憩60分）勤務地： いちご訪問看護リハビリステーション・本社・東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401・東京事務所：東京都中央区八丁堀4-10-8-501・富士見台サテライト：東京都練馬区貫井3-31-15 スズキビル１B重度特化住宅型有料老人ホーム いちごの里・一宮事業所：愛知県一宮市奥町字野方16-1いちご介護訪問看護ステーション いちごの里：・一宮今伊勢事業所：愛知県一宮市今伊勢町馬寄字北塚本19番1号　ルナエマーレ103各種SNSで社員や職場の情報を発信中：・インスタグラム：ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション　柳田顕 インタビューのどちらかを検索・インスタをフォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインを想定しています。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕"'
