  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの「訪問看護師 - 面談確約 - 」のキャリアをご検討いただきたく、ご連絡いたしました。これまで腎臓内科・精神科・整形外科など幅広い診療科で10年以上ご経験を積まれた後、クリニックや訪問看護にも携わってこられている点に強く惹かれました。病院・外来・在宅と複数の現場をご経験されている方は非常に希少であり、訪問看護の現場においても即戦力としてご活躍いただけると感じております。また、訪問看護のご経験もお持ちでいらっしゃることから、在宅医療の流れや働き方を理解されている点も大きな強みです。「より働きやすい環境で続けたい」とお考えの方にとって、条件面を見直す良いタイミングではないかと感じ、ご連絡させていただきました。５月下旬〜６月上旬頃にさいたま市へお引越し予定とのことで、勤務地として埼玉・都内北部エリアを検討されている点も拝見いたしました。当ステーションは東京都練馬区が勤務地となり、訪問範囲は練馬区・杉並区の一部（事業所より半径3km圏内）とコンパクトなため、落ち着いて業務に取り組める環境です。また、土日祝休み・日勤のみ・オンコールなしといった働き方を重視されている点も拝見しております。当ステーションでも無理なく長く働いていただける環境づくりを重視しており、働き方についてはご希望に合わせてご相談可能です。現在は1か月以内でのご転職をご検討されているとのことで、タイミングとしてもぜひ一度お話しさせていただければ幸いです。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：350,000円〜458,000円特徴：☆ 看護師とリハビリ職が半々、20〜30代が活躍☆ 子育て中のスタッフも多く、フォローし合う雰囲気☆ 同行訪問、オンライン研修あり☆ 年間休日125日、残業ほぼなし勤務時間：・正社員 9:00〜18:00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューまずは情報収集としてのカジュアル面談でも大歓迎です。これまでのご経験やご希望の働き方についても含めて、ぜひ一度率直にお話しできれば幸いです。ご返信を心よりお待ちしております。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
