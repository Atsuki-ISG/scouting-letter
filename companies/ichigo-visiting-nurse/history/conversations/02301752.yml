  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの「訪問看護師 - 面談確約 - 」のキャリアをご検討いただきたく、ご連絡いたしました。これまで急性期領域（消化器内科・外科）でのご経験に加え、美容外科・美容皮膚科、さらに現在は内科・整形外科・健診領域でもご活躍されており、幅広いご経験を積まれている点に強く惹かれました。臨床での基礎力と、美容領域で培われた丁寧な対応力を兼ね備えていらっしゃる点は、訪問看護においても大きな強みになると感じております。また、現在は東京都内でのご勤務をご希望されているとのことで、新宿区・渋谷区・中野区といったエリアをご検討されている点から、都内でのキャリアアップも見据えたご転職をお考えなのではないかと感じ、ご連絡させていただきました。訪問看護は、ご利用者様一人ひとりとじっくり向き合いながら看護を行うため、これまでのご経験を活かしつつ、より主体的に働ける環境です。日勤のみ・年間休日125日といった働きやすさもあり、無理なく長く働きながらスキルアップしていただけます。年収500万円以上をご希望とのことですが、これまでのご経験や今後のご活躍を踏まえ、条件面についてもぜひ一度ご相談させていただければと考えております。また、3ヶ月以内でのご転職をご検討されているとのことで、タイミングとしてもぜひ一度お話しさせていただきたいと思いました。勤務地は東京都練馬区となりますが、訪問範囲は半径3km圏内とコンパクトで、都内での生活基盤を整えながら働いていただきやすい環境です。訪問看護が未経験の方でも、同行訪問やオンライン研修を通じて安心してスタートしていただける体制を整えております。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：350,000円〜458,000円特徴：☆ 看護師とリハビリ職が半々、20〜30代が活躍☆ 子育て中のスタッフも多く、フォローし合う雰囲気☆ 同行訪問、オンライン研修あり☆ 年間休日125日、残業ほぼなし勤務時間：・正社員 9:00〜18:00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューまずは情報収集としてのカジュアル面談でも大歓迎です。都内でのキャリアの選択肢として、ぜひ一度率直にお話しできれば幸いです。ご返信を心よりお待ちしております。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
