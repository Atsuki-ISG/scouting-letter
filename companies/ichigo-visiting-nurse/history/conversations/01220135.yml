  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として10年以上ご経験され、小児科病院でのご勤務経験に加え、認証・認可保育所、そして介護老人保健施設や特別養護老人ホームでも継続してご勤務されてきた点に感銘を受けました。医療の現場だけでなく、生活に近い環境で長く関わってこられたご経験は、在宅の現場でも利用者様の安心につながる大きな強みになると感じます。また、東京都北区にお住まいで、北区・豊島区・板橋区・文京区エリアでのご勤務をご希望とのこと、当ステーション（練馬区）は募集勤務地が異なるものの、板橋区にお住まいの方にも通勤しやすいエリアですので、候補の一つとしてご覧いただければと思います。現在は離職中で、勤務形態はパート・バイトをご希望、入職時期も「3か月以内」とのことでしたので、無理のない形で再スタートできる働き方を一緒に相談できればと思っております。未経験可・ブランク可も重視されている点を拝見しており、安心して始められる体制も含めてご案内できればと思います。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。訪問範囲は、練馬区、杉並区の一部（おおむね事業所より半径3km圏内）でございます。（一部例外有）当ステーションは、ワークライフバランスを重視しており、パート勤務の曜日・時間帯なども含めてご希望に合わせてご相談可能です。訪問が初めての方でも、同行訪問・オンライン研修などのサポート体制がございます。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与（正社員の場合）：350,000円〜458,000円特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育てママ多数活躍中！急な休みでもフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間（正社員の場合）：・9:00〜18:00（休憩60分）※パート勤務はご希望に合わせて調整可能です勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401・東京事務所：東京都中央区八丁堀4-10-8-501・富士見台サテライト：東京都練馬区貫井3-31-15 スズキビル1B重度特化住宅型有料老人ホーム いちごの里各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューのどちらかを検索、フォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、パート勤務のご希望（勤務日数・時間帯など）について、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
