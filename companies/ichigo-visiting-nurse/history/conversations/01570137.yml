  text: 🍓未経験歓迎🍓月給30万円〜！年間休日125日！面接確約！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師としてご経験を積まれ、慢性期・急性期・総合診療科・回復期・終末期まで幅広い領域を経験された上で、現在はサービス付き高齢者向け住宅にてご勤務されている点に感銘を受けました。病院で培われた観察力と、施設での生活に寄り添う視点の両方をお持ちであることは、在宅に近い現場でも大きな強みになると感じます。また、人と関わることや人の笑顔が好きというお考えがとても素敵で、利用者様やご家族様の不安に寄り添いながら安心を届けられる方だと感じました。入職後も自己研鑽に努め、資格取得を目指されている点も印象的です。加えて、精神科訪問看護研修会（算定要件を満たす研修）を既に修了されているとのこと、学びに前向きで、専門性を高めながらキャリアを広げていきたい姿勢が伝わってきました。お住まいは愛知県一宮市で、一宮市を中心に津島市・稲沢市・愛西市・名古屋市内・江南市など幅広く勤務地をご検討とのことですが、当ステーションは愛知県一宮市での募集となり、通勤面でもご検討いただきやすい立地かと思います。入職時期も「3か月以内」とのことでしたので、まずは早めにカジュアルにお話できればと思っております。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると感じております。現在、いちご介護訪問看護ステーションでは、愛知県一宮市でご勤務いただける看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：300,000円〜458,000円（ご経験等によりご相談）特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育て世代も多数活躍中！急な休みでもフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員 9：00～18：00（休憩60分）勤務地：重度特化住宅型有料老人ホーム いちごの里・一宮事業所：愛知県一宮市奥町字野方16-1いちご介護訪問看護ステーション いちごの里：・一宮今伊勢事業所：愛知県一宮市今伊勢町馬寄字北塚本19番1号 ルナエマーレ103各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビュー検索・フォローいただくと最新情報もご覧いただけます。ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望、精神科領域を含め今後伸ばしていきたい分野などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション 柳田 顕
