  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度はご経歴を拝見し、いちご訪問看護リハビリステーションの「訪問看護師 - 面談確約 - 」のキャリアをご検討いただきたく、ご連絡いたしました。これまで一般内科・整形外科・一般外科・精神科・皮膚科・眼科・耳鼻咽喉科など幅広い領域でご経験を積まれており、さらに訪問看護や在宅医療のご経験までお持ちである点に強く惹かれました。病院・クリニック・在宅と幅広い現場で利用者様や患者様、ご家族様と向き合ってこられたご経験は、訪問看護の現場において非常に大きな強みだと感じております。特に、看護部リーダーや訪問看護ステーションでのリーダー経験をお持ちである点からも、現場での看護力だけでなく、周囲と連携しながら主体的に動ける方だと感じました。利用者様やご家族様が安心して過ごせるよう寄り添いたいというお気持ちや、傾聴力・コミュニケーション力を大切にされている点も、在宅の現場に非常にマッチしていると感じております。また、現在は離職中で、今すぐのご入職が可能とのことで、タイミングとしてもぜひ一度お話しさせていただきたいと思いました。勤務地についても練馬区・板橋区・清瀬市をご希望されている中で、当ステーションは東京都練馬区に拠点を構えており、訪問範囲も事業所から半径3km圏内と比較的コンパクトなため、地域に密着して働いていただきやすい環境です。すでに訪問看護のご経験をお持ちの方だからこそ、これまでのご経験を活かしながら、より働きやすい環境やチーム体制の中でご活躍いただけるのではないかと考えております。まずは情報収集も兼ねて、ぜひ一度率直にお話しできれば幸いです。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置（血糖値測定、点滴、注射、痰吸引など）・管理者、介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医、ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：350,000円〜458,000円特徴：☆ 看護師とリハビリ職が半々、20〜30代が活躍☆ 子育て中のスタッフも多く、フォローし合う雰囲気☆ 同行訪問、オンライン研修あり☆ 年間休日125日、残業ほぼなし勤務時間：・正社員 9:00〜18:00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社、東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューまずは情報収集としてのカジュアル面談でも大歓迎です。これまでのご経験や今後の働き方についても含めて、ぜひ一度お話しできれば幸いです。ご返信を心よりお待ちしております。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
