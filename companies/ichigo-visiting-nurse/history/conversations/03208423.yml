  text: 熊澤様いちご訪問看護リハビリステーションの柳田です。この度はご連絡いただき、誠にありがとうございます。熊澤様とお話しできる機会をいただけて、とても嬉しく思っております。さっそくではございますが、面接の日程が確定いたしましたのでお知らせいたします。当日は、お互いにリラックスしていろいろなお話ができればと考えております。そのため、スーツなどではなく、どうぞ普段通りのカジュアルな服装で気兼ねなくお越しくださいね。もし上記の日程でご都合が悪くなってしまった場合は、どうぞ遠慮なくお知らせください。すぐに別の日程を調整させていただきますのでご安心くださいませ。その他、事前に聞いておきたいことや、道順についてのご質問などがございましたら、いつでもお気軽にお問い合わせいただければと思います。熊澤様とお会いできることを、心より楽しみにしております。当日はどうぞお気をつけてお越しくださいませ。よろしくお願い申し上げます。
