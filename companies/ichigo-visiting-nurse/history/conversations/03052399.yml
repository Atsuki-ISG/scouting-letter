- date: '2026-02-10'
  label: スカウト
  role: company
  text: 🍓未経験歓迎🍓月給30万円〜！年間休日125日！面接確約！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。准看護師として3年ご経験され、現在も就業中でいらっしゃる点に感銘を受けました。愛知県一宮市にお住まいで、勤務地も一宮市をご希望されているとのこと、地域に根差して長く働きたいというお気持ちとも親和性が高いと感じております。また、自動車運転免許をお持ちである点は、訪問看護の現場において大きな強みです。移動を伴う業務でもスムーズに対応でき、利用者様のもとへ安定して訪問できる体制づくりに貢献いただけると感じます。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると感じております。現在、いちご介護訪問看護ステーションでは、愛知県一宮市でご勤務いただける看護師を募集しております。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与：300,000円〜458,000円特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育てママ多数活躍中！急な休みでも嫌な顔をしないフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員 9：00～18：00（休憩60分）勤務地：重度特化住宅型有料老人ホーム いちごの里・一宮事業所：愛知県一宮市奥町字野方16-1いちご介護訪問看護ステーション いちごの里：・一宮今伊勢事業所：愛知県一宮市今伊勢町馬寄字北塚本19番1号 ルナエマーレ103各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション 柳田顕 インタビューのどちらかを検索・インスタをフォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション 柳田 顕
