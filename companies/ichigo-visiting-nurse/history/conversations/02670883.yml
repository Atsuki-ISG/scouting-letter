- date: '2026-03-25'
  label: スカウト
  role: company
  text: 🍓未経験歓迎🍓月給35万円〜！年間休日125日！面接確約です！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。混合外科病棟での看護を通じて、インフォームドコンセントの重要性を深く捉え、患者様との信頼関係を軸に意思決定を支える姿勢に感銘を受けました。多職種間での情報共有やカンファレンスの必要性まで含めて考え、必要に応じてアドボケーターとして患者様の本質的な思いを汲み取り尊重していくお考えは、在宅の現場でも非常に大切な視点だと感じます。実際に「医師には話せなかったけど話してみようと思う」と言っていただけた経験があり、治療方針の変更につながったというエピソードからも、丁寧な関係構築ができる方だと強く感じました。また、急性期の混合病棟（乳腺外科・耳鼻咽喉科・泌尿器科・産婦人科）でのご経験に加え、現在は小児科クリニックでもご勤務されているとのこと、幅広い対象に合わせて柔軟に関われる点もとても素敵です。自己研鑽を続け、患者様の本質を見抜けるよう努力される姿勢も、当ステーションが大切にしている価値観と親和性が高いと感じます。東京都板橋区にお住まいで、板橋区・練馬区・豊島区など都内に加え埼玉県志木市も含めて勤務地をご検討されているとのこと、当ステーション（練馬区）は通勤面でもご検討いただきやすい立地かと思います。現在は離職中で「今すぐに」ご入職を希望されているとのことでしたので、ぜひ早めに一度お話できればと思っております。即日勤務OKやブランク可も含め、環境の整った職場で再スタートしたいというご意向が伝わってきました。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると思います。現在、いちご訪問看護リハビリステーションでは、東京都練馬区でご勤務いただける訪問看護師を募集しております。訪問範囲は、練馬区、杉並区の一部。おおむね事業所より半径3㎞圏内でございます。（一部例外有）東京都板橋区にお住まいの方にも検討いただきやすいエリアですので、ぜひ候補の一つとしてご覧いただければと思います。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。訪問が初めての方でも、同行訪問・オンライン研修などのサポート体制がございます。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与： 350,000円〜458,000円特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育てママ多数活躍中！急な休みでも嫌な顔をしないフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員　9：00～18：00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社・東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401・東京事務所：東京都中央区八丁堀4-10-8-501・富士見台サテライト：東京都練馬区貫井3-31-15 スズキビル１B重度特化住宅型有料老人ホーム いちごの里各種SNSで社員や職場の情報を発信中：・インスタグラム：＠ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション　柳田顕 インタビューのどちらかを検索・インスタをフォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、入職時期・働き方、これまでのご経験（意思決定支援・多職種連携）を訪問看護でどのように活かせるかについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
