  text: 🍓未経験歓迎🍓月給30万円〜！年間休日125日！面接確約！はじめまして！いちご訪問看護リハビリステーションの柳田と申します！！この度は、ご経歴を拝見し、いちご訪問看護リハビリステーションの『訪問看護師 - 面談確約 - 』のキャリアをご検討いただきたく、ご連絡いたしました。看護師として約9年、診療所から病院の腎臓内科、さらに通所介護や特別養護老人ホームまで、医療と介護の両面で幅広くご経験されてきた点に感銘を受けました。腎臓内科でのご経験を通じて、慢性疾患の方の体調変化を丁寧に捉えながら関わってこられたことに加え、介護現場では生活の中での安全や安心を支える視点も培ってこられた点がとても素敵だと感じます。また、正職員だけでなくパートとして複数の現場で柔軟にご活躍されていることから、環境の違いに適応しながら必要なケアを提供できる実践力や、関係者との連携力も強みとしてお持ちだと感じました。在宅の現場でも、利用者様の状態を見極めつつ、医師やケアマネ、ご家族と連携して支援を進める場面が多いため、これまでのご経験がそのまま活かしていただけると思っております。今までのご経験は、地域に根差した当ステーションが目指す「一期一会の出会いを大切にした訪問看護リハビリ」において、重要な役割を担っていただけると感じております。現在、いちご介護訪問看護ステーションでは、愛知県一宮市でご勤務いただける看護師を募集しております。当ステーションは、ワークライフバランスを重視しており、柔軟な働き方（時短勤務など）の相談を歓迎します。一人ひとりのライフステージやご家庭の状況に合わせて、最適な勤務形態を一緒に検討し、無理なく長期的に活躍できる環境を提供いたします。＜募集要項概要＞仕事内容・患者さんのお宅に訪問し、安心して療養生活を送れるよう、看護をお願いします。＜具体的には＞・バイタルチェック・医療処置(血糖値測定､点滴､注射､痰吸引など)・管理者､介護スタッフへ身体状況の報告・介護度や生活環境を考慮したリハビリなど・主治医・ケアマネとの情報共有お客様の特徴・介護保険の訪問が中心・医療依存度の高い利用者様は数名給与： 300,000円〜458,000円特徴：☆ 男女は5:5！看護師とリハビリ職も5:5！20〜30代が活躍！☆ 子育てママ多数活躍中！急な休みでも嫌な顔をしないフォローし合う雰囲気あり！☆ 同行訪問・オンライン研修あり！訪問看護が初めての方でも大丈夫◎☆ 事業拡大に伴い、ステーション立ち上げやマネジメントを学べる環境あり！☆ 年間休日125日！いちご独自の記念日休暇あり！残業ほぼなし！勤務時間：・正社員　9：00～18：00（休憩60分）勤務地：いちご訪問看護リハビリステーション・本社・東事業所：東京都練馬区石神井町7-1-14 石神井スカイビル401・東京事務所：東京都中央区八丁堀4-10-8-501・富士見台サテライト：東京都練馬区貫井3-31-15 スズキビル１B重度特化住宅型有料老人ホーム いちごの里・一宮事業所：愛知県一宮市奥町字野方16-1いちご介護訪問看護ステーション いちごの里：・一宮今伊勢事業所：愛知県一宮市今伊勢町馬寄字北塚本19番1号　ルナエマーレ103各種SNSで社員や職場の情報を発信中：・インスタグラム： @ichigohoumonkango・YouTube：いちご訪問看護リハビリステーション　柳田顕 インタビューのどちらかを検索・インスタをフォローすると最新情報をGET！ご興味をお持ちいただけましたら、当ステーションのより詳しい情報や、働き方のご希望などについて、ぜひ一度お話する機会をいただけないでしょうか。（カジュアル面談はオンラインも可能です。）ご多忙のところ恐縮ですが、ご返信いただけますと幸いです。何卒よろしくお願い申し上げます。いちご訪問看護リハビリステーション　柳田 顕
