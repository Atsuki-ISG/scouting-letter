<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Assistant</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Scout Assistant</h1>
      <div class="company-select">
        <label for="company">会社:</label>
        <select id="company">
          <option value="ark-visiting-nurse">ark-visiting-nurse</option>
          <option value="lcc-visiting-nurse">lcc-visiting-nurse</option>
        </select>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="extract">📋 抽出</button>
      <button class="tab" data-tab="send">📤 送信</button>
      <button class="tab" data-tab="conversation">💬 返信</button>
    </nav>

    <!-- Phase 1: 抽出パネル -->
    <section id="panel-extract" class="panel active">
      <div class="extraction-controls">
        <div class="input-group">
          <label for="extract-start">開始会員番号:</label>
          <input type="text" id="extract-start" placeholder="空欄=先頭から">
        </div>
        <div class="input-group">
          <label for="extract-count">抽出件数:</label>
          <input type="number" id="extract-count" value="5" min="1" max="50">
        </div>
        <button id="btn-start-extract" class="btn btn-primary">抽出開始</button>
        <button id="btn-stop-extract" class="btn btn-danger hidden">停止</button>
      </div>

      <div id="extraction-progress" class="progress-section hidden">
        <div class="progress-text">
          進捗: <span id="progress-current">0</span>/<span id="progress-total">0</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <button id="btn-download-csv" class="btn btn-secondary hidden">
        CSVダウンロード
      </button>

      <div id="extracted-list" class="candidate-list"></div>
    </section>

    <!-- Phase 3: 送信アシストパネル -->
    <section id="panel-send" class="panel hidden">
      <div class="job-offer-select">
        <label for="job-offer">対象求人:</label>
        <select id="job-offer">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <div class="import-controls">
        <button id="btn-import-csv" class="btn btn-primary">CSVファイル</button>
        <button id="btn-toggle-paste" class="btn btn-secondary">貼り付け</button>
        <button id="btn-clear-candidates" class="btn btn-danger">クリア</button>
      </div>

      <div id="paste-import" class="paste-import hidden">
        <textarea id="paste-csv" class="paste-textarea" placeholder="Gemini等から出力されたCSVをここに貼り付け&#10;（コードブロックの中身をそのままペーストしてください）" rows="6"></textarea>
        <button id="btn-paste-import" class="btn btn-primary btn-block">インポート</button>
      </div>

      <div class="auto-job-offer-controls">
        <label class="toggle-label">
          <input type="checkbox" id="toggle-auto-job-offer" checked>
          求人自動選択
        </label>
      </div>

      <div class="continuous-send-controls">
        <label class="toggle-label">
          <input type="checkbox" id="toggle-continuous">
          連続送信アシスト
        </label>
        <button id="btn-start-continuous" class="btn btn-primary hidden">開始</button>
        <button id="btn-skip-continuous" class="btn btn-secondary hidden">スキップ</button>
        <button id="btn-stop-continuous" class="btn btn-danger hidden">停止</button>
      </div>

      <div id="send-progress" class="progress-section hidden">
        <div class="progress-text">
          進捗: <span id="send-current">0</span>/<span id="send-total">0</span> 送信済み
        </div>
        <div class="progress-bar">
          <div id="send-progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div id="candidate-list" class="candidate-list"></div>

      <div id="fix-export" class="fix-export hidden">
        <button id="btn-export-fixes" class="btn btn-secondary btn-block">修正履歴エクスポート</button>
      </div>

      <div class="debug-controls">
        <label class="toggle-label">
          <input type="checkbox" id="toggle-dry-run">
          ドライランモード
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-debug-log">
          デバッグログ
        </label>
      </div>
      <div id="debug-log-panel" class="hidden">
        <div class="debug-log-header">
          <span>デバッグログ</span>
          <button id="btn-clear-debug" class="btn btn-sm">クリア</button>
        </div>
        <div id="debug-log-entries"></div>
      </div>
    </section>
    <!-- 返信・やりとりパネル -->
    <section id="panel-conversation" class="panel hidden">
      <div class="conversation-controls">
        <button id="btn-extract-conversation" class="btn btn-primary">やりとりを取得</button>
        <button id="btn-batch-extract" class="btn btn-primary">一括取得</button>
        <button id="btn-toggle-manual" class="btn btn-secondary">手動入力</button>
      </div>

      <div id="conversation-status" class="status-message hidden"></div>

      <!-- 手動入力フォーム -->
      <div id="manual-input-form" class="manual-form hidden">
        <div class="input-group">
          <label for="manual-member-id">会員番号:</label>
          <input type="text" id="manual-member-id" placeholder="例: 03122692">
        </div>
        <div class="manual-messages-group">
          <label for="manual-messages">やりとり内容:</label>
          <textarea id="manual-messages" class="manual-textarea" placeholder="企業: はじめまして...&#10;求職者: ご連絡ありがとうございます...&#10;企業: ご返信ありがとうございます...&#10;&#10;※日付行（2026-03-01）を挟むと日付が反映されます"></textarea>
        </div>
        <button id="btn-save-manual" class="btn btn-primary btn-block">保存</button>
      </div>

      <div id="conversation-list" class="conversation-list"></div>

      <div class="export-section">
        <button id="btn-export-all-conversations" class="btn btn-secondary btn-block">全件YAMLエクスポート</button>
        <button id="btn-export-reply-records" class="btn btn-secondary btn-block">返信スカウト記録エクスポート</button>
      </div>
    </section>
    <div id="confirmation-popup" class="hidden"></div>
  </div>

  <script type="module" src="index.ts"></script>
</body>
</html>
