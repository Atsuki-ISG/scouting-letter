<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Assistant 設定</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      font-size: 13px;
      color: #333;
      width: 280px;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2563eb;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
    }
    select, input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #2563eb;
      color: white;
      margin-top: 8px;
    }
    .btn:hover { background: #1d4ed8; }
    .status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Scout Assistant 設定</h2>

  <div class="field">
    <label for="company">会社:</label>
    <select id="company">
      <option value="ark-visiting-nurse">アーク訪問看護ステーション</option>
    </select>
  </div>

  <button id="btn-open-panel" class="btn">サイドパネルを開く</button>

  <div id="status" class="status">保存しました</div>

  <script src="Popup.ts" type="module"></script>
</body>
</html>
