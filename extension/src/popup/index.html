<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Assistant 設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <h1>Scout Assistant</h1>
    <div class="popup-header__sub">設定 & 接続</div>
  </header>

  <div class="popup-body">
    <!-- 会社選択 -->
    <section class="card">
      <div class="card__title">会社</div>
      <div class="field">
        <select id="company"></select>
      </div>
      <button id="btn-open-panel" class="btn btn-primary">サイドパネルを開く</button>
    </section>

    <!-- API 設定 -->
    <section class="card">
      <div class="card__title">API 設定</div>
      <div class="field">
        <label for="api-endpoint">エンドポイント</label>
        <input type="text" id="api-endpoint" placeholder="https://scout-api-xxxxx.run.app">
      </div>
      <div class="field">
        <label for="api-key">パスワード</label>
        <input type="password" id="api-key" placeholder="パスワードを入力">
      </div>
      <button id="btn-test-api" class="btn btn-secondary">接続テスト</button>
      <div id="api-status" class="status hidden"></div>
    </section>

    <!-- GAS 連携 -->
    <section class="card">
      <div class="card__title">GAS 連携</div>
      <label class="field-inline">
        <input type="checkbox" id="gas-enabled">
        <span>有効化</span>
      </label>
      <div class="field">
        <label for="gas-url">Web App URL</label>
        <input type="text" id="gas-url" placeholder="https://script.google.com/...">
      </div>
      <button id="btn-test-gas" class="btn btn-secondary">接続テスト</button>
      <div id="gas-status" class="status hidden"></div>
    </section>

    <div id="status" class="status hidden">保存しました</div>
  </div>

  <script src="Popup.ts" type="module"></script>
</body>
</html>
