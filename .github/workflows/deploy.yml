name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          cd server
          gcloud run deploy scout-api \
            --source . \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --update-env-vars "SPREADSHEET_ID=1A5zSAVSzxt2ouEdV8moeu_85uUXOGKyJj7OxDP2Oc18,GEMINI_MODEL=gemini-3-flash-preview,GEMINI_FALLBACK_MODELS=gemini-2.5-flash,GEMINI_THINKING_BUDGET=2048,LOCATION=global,PROJECT_ID=scout-generation-490709,ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }},GOOGLE_CHAT_WEBHOOK_URL=${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }},REPORTS_DRIVE_FOLDER_ID=1W9old6Pr6ZiFQH1ItlZiMuAr-vEnY1N7" \
            --remove-env-vars "GEMINI_API_KEY" \
            --memory 1Gi \
            --timeout 300 \
            --min-instances 2 \
            --quiet
