<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WelMe Scout</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="app" class="panel">
    <header class="hdr">
      <div class="hdr__logo" id="hdr-badge">徳</div>
      <div class="hdr__text">
        <div class="hdr__title" id="hdr-title">Scout</div>
        <div class="hdr__sub" id="hdr-sub">WelMe</div>
      </div>
    </header>

    <section class="status">
      <div class="status__row">
        <span class="label">今日の送信</span>
        <span class="mono value" id="today-count">0</span>
      </div>
      <div class="status__row">
        <span class="label">前回送信</span>
        <span class="mono value" id="last-sent">—</span>
      </div>
    </section>

    <section class="how">
      <details>
        <summary>使い方</summary>
        <ol>
          <li>候補者一覧ページを開く</li>
          <li>候補者の「スカウトする」ボタンを押す</li>
          <li>新しいタブで本文が自動的に入ります</li>
          <li>内容を確認して、WelMe 側の「送信」を押す</li>
        </ol>
        <p class="note">※本文は型はめで自動生成されます。手動で編集した後は自動フィルは上書きしません。</p>
      </details>
    </section>

    <section class="history">
      <div class="history__head">
        <span class="label">送信履歴</span>
        <div class="history__actions">
          <button class="btn small" id="btn-csv">CSV出力</button>
          <button class="btn small danger" id="btn-clear">全削除</button>
        </div>
      </div>
      <ul class="history__list" id="history-list"></ul>
      <div class="empty" id="history-empty">まだ送信履歴はありません</div>
    </section>

    <footer class="ftr">
      <span id="ftr-build"></span>
    </footer>
  </main>
  <script type="module" src="./app.ts"></script>
</body>
</html>
