<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #f8fafc;
  color: #1e293b;
  line-height: 1.6;
}

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  color: #2563eb;
  margin-right: 8px;
}

.header select, .header button {
  height: 36px;
  border-radius: 6px;
  border: 1px solid #cbd5e1;
  padding: 0 12px;
  font-size: 14px;
  font-family: inherit;
}

.header select { background: #fff; min-width: 200px; }

.btn {
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  padding: 0 16px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
}

.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #e2e8f0; color: #334155; }
.btn-secondary:hover { background: #cbd5e1; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-danger:hover { background: #fecaca; }
.btn-sm { height: 30px; padding: 0 10px; font-size: 13px; }

.header-right { margin-left: auto; display: flex; gap: 8px; }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: #fff;
  border-bottom: 2px solid #e2e8f0;
  padding: 0 24px;
  overflow-x: auto;
}

.tab {
  padding: 12px 20px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: #64748b;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: color 0.15s;
  user-select: none;
}

.tab:hover { color: #2563eb; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; }

/* Content */
.content { padding: 24px; }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.toolbar-title { font-size: 16px; font-weight: 600; color: #475569; }

/* Table */
.table-wrap {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

thead th {
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  color: #475569;
  white-space: nowrap;
  position: sticky;
  top: 0;
}

tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid #f1f5f9;
  max-width: 240px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

tbody tr:hover { background: #f8fafc; }

.actions-cell {
  white-space: nowrap;
  display: flex;
  gap: 6px;
}

.empty-msg {
  text-align: center;
  padding: 48px 24px;
  color: #94a3b8;
  font-size: 15px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 16px;
  overflow-y: auto;
}

.modal-overlay.open { display: flex; }

.modal {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  width: 100%;
  max-width: 640px;
  animation: slideDown 0.2s ease-out;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-header {
  padding: 16px 24px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 { font-size: 16px; font-weight: 600; }

.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #94a3b8;
  padding: 4px;
  line-height: 1;
}

.modal-close:hover { color: #475569; }

.modal-body { padding: 24px; }

.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #475569;
  margin-bottom: 4px;
}

.field .hint {
  font-size: 12px;
  color: #94a3b8;
  font-weight: 400;
  margin-left: 6px;
}

.field input, .field textarea, .field select {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.15s;
}

.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.field textarea { min-height: 300px; resize: vertical; white-space: pre-wrap; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1e293b;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  animation: fadeInUp 0.2s ease-out;
  max-width: 360px;
}

.toast.error { background: #dc2626; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Loading */
.loading {
  display: flex;
  justify-content: center;
  padding: 48px;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #e2e8f0;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* API Key Dialog */
.apikey-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  justify-content: center;
  align-items: center;
}

.apikey-dialog.open { display: flex; }

.apikey-box {
  background: #fff;
  border-radius: 12px;
  padding: 32px;
  width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.apikey-box h3 { margin-bottom: 16px; font-size: 18px; }
.apikey-box input {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 14px;
  margin-bottom: 16px;
  font-family: monospace;
}
.apikey-box input:focus { outline: none; border-color: #2563eb; }
.apikey-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<header class="header">
  <span class="header-title">Scout Admin</span>
  <select id="companySelect">
    <option value="ark-visiting-nurse">ARK訪問看護</option>
    <option value="lcc-visiting-nurse">LCC訪問看護</option>
  </select>
  <div class="header-right">
    <button class="btn btn-secondary" onclick="reloadCache()">キャッシュ更新</button>
    <button class="btn btn-secondary" onclick="showApiKeyDialog()">APIキー設定</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main class="content" id="content"></main>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSave">保存</button>
    </div>
  </div>
</div>

<!-- API Key Dialog -->
<div class="apikey-dialog" id="apikeyDialog">
  <div class="apikey-box">
    <h3>APIキーを入力</h3>
    <input type="password" id="apikeyInput" placeholder="APIキー">
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeApiKeyDialog()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<script>
// --- Config ---
const TABS = [
  { slug: 'templates', name: 'テンプレート' },
  { slug: 'patterns', name: 'パターン' },
  { slug: 'qualifiers', name: '資格修飾' },
  { slug: 'prompts', name: 'プロンプト' },
  { slug: 'job_offers', name: '求人' },
  { slug: 'validation', name: 'バリデーション' },
];

const TEXTAREA_FIELDS = new Set(['body', 'template_text', 'content', 'qualification_rules', 'feature_variations']);

// Column name → Japanese label
const FIELD_LABELS = {
  company: '会社',
  job_category: '職種カテゴリ',
  type: 'テンプレート種別',
  body: 'テンプレート本文',
  pattern_type: 'パターン型',
  employment_variant: '就業状態',
  template_text: 'パターン本文',
  feature_variations: '特色バリエーション',
  qualification_combo: '資格の組み合わせ',
  replacement_text: '差し替え文',
  section_type: 'セクション種別',
  order: '表示順',
  content: '内容',
  id: '求人ID',
  name: '求人名',
  label: '表示ラベル',
  employment_type: '雇用形態',
  active: '有効',
  age_min: '年齢下限',
  age_max: '年齢上限',
  qualification_rules: '資格ルール（JSON）',
};

const FIELD_HINTS = {
  feature_variations: '| 区切り',
  qualification_combo: 'カンマ区切り（例: 看護師,保健師）',
  job_category: 'nurse / rehab_pt / rehab_st / medical_office',
  active: 'TRUE / FALSE',
  pattern_type: 'A / B1 / B2 / C / D / E / F / G',
  employment_variant: '就業中 / 離職中（空欄可）',
};

// --- State ---
let currentTab = TABS[0].slug;
let currentHeaders = [];
let currentRows = [];

// --- API ---
function getApiKey() {
  return localStorage.getItem('scout_admin_api_key') || '';
}

async function api(method, path, body) {
  const key = getApiKey();
  if (!key) {
    showApiKeyDialog();
    throw new Error('APIキーが設定されていません');
  }
  const opts = {
    method,
    headers: { 'X-API-Key': key, 'Content-Type': 'application/json' },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const text = await res.text();
    let msg;
    try { msg = JSON.parse(text).detail || text; } catch { msg = text; }
    throw new Error(`${res.status}: ${msg}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

// --- API Key Dialog ---
function showApiKeyDialog() {
  document.getElementById('apikeyInput').value = getApiKey();
  document.getElementById('apikeyDialog').classList.add('open');
  document.getElementById('apikeyInput').focus();
}

function closeApiKeyDialog() {
  document.getElementById('apikeyDialog').classList.remove('open');
}

function saveApiKey() {
  const key = document.getElementById('apikeyInput').value.trim();
  if (key) {
    localStorage.setItem('scout_admin_api_key', key);
    closeApiKeyDialog();
    toast('APIキーを保存しました');
    loadData();
  }
}

// --- Toast ---
function toast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Tabs ---
function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t =>
    `<div class="tab ${t.slug === currentTab ? 'active' : ''}" data-slug="${t.slug}">${t.name}</div>`
  ).join('');
  nav.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      currentTab = el.dataset.slug;
      renderTabs();
      loadData();
    });
  });
}

// --- Data Loading ---
async function loadData() {
  const company = document.getElementById('companySelect').value;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const data = await api('GET', `/api/v1/admin/${currentTab}?company=${company}`);
    currentHeaders = data.headers;
    currentRows = data.rows;
    renderTable();
  } catch (e) {
    content.innerHTML = `<div class="empty-msg">${e.message}</div>`;
  }
}

// --- Table Rendering ---
function renderTable() {
  const tabName = TABS.find(t => t.slug === currentTab).name;
  const content = document.getElementById('content');

  if (currentRows.length === 0) {
    content.innerHTML = `
      <div class="toolbar">
        <span class="toolbar-title">${tabName}</span>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
      </div>
      <div class="table-wrap"><div class="empty-msg">データがありません</div></div>`;
    return;
  }

  const displayHeaders = currentHeaders.filter(h => h !== '_row_index');

  let html = `
    <div class="toolbar">
      <span class="toolbar-title">${tabName}（${currentRows.length}件）</span>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          ${displayHeaders.map(h => `<th>${FIELD_LABELS[h] || h}</th>`).join('')}
          <th>操作</th>
        </tr></thead>
        <tbody>`;

  for (const row of currentRows) {
    html += '<tr>';
    for (const h of displayHeaders) {
      const val = row[h] ?? '';
      html += `<td title="${escHtml(String(val))}">${escHtml(String(val))}</td>`;
    }
    html += `<td><div class="actions-cell">
      <button class="btn btn-secondary btn-sm" onclick="openEditModal(${row._row_index})">編集</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRow(${row._row_index})">削除</button>
    </div></td></tr>`;
  }

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Modal ---
function openModal(title, fields, values, onSave) {
  document.getElementById('modalTitle').textContent = title;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  for (const f of fields) {
    const div = document.createElement('div');
    div.className = 'field';

    const label = FIELD_LABELS[f] || f;
    let hint = FIELD_HINTS[f] ? `<span class="hint">${FIELD_HINTS[f]}</span>` : '';
    div.innerHTML = `<label>${label}${hint}</label>`;

    let input;
    if (TEXTAREA_FIELDS.has(f)) {
      input = document.createElement('textarea');
      input.dataset.isTextarea = '1';
    } else {
      input = document.createElement('input');
      input.type = 'text';
    }
    input.name = f;
    // Display \n as actual newlines in textarea
    let val = values[f] ?? '';
    if (TEXTAREA_FIELDS.has(f)) {
      val = val.replace(/\\n/g, '\n');
    }
    input.value = val;

    // Pre-fill company for new rows
    if (f === 'company' && !values[f]) {
      input.value = document.getElementById('companySelect').value;
    }

    div.appendChild(input);
    body.appendChild(div);
  }

  const saveBtn = document.getElementById('modalSave');
  const newSave = saveBtn.cloneNode(true);
  saveBtn.parentNode.replaceChild(newSave, saveBtn);
  newSave.id = 'modalSave';
  newSave.addEventListener('click', () => {
    const data = {};
    body.querySelectorAll('input, textarea').forEach(el => {
      let v = el.value;
      // Convert real newlines back to \n for storage
      if (el.dataset.isTextarea === '1') {
        v = v.replace(/\n/g, '\\n');
      }
      data[el.name] = v;
    });
    onSave(data);
  });

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function openAddModal() {
  const tabName = TABS.find(t => t.slug === currentTab).name;
  const fields = currentHeaders.filter(h => h !== '_row_index');
  openModal(`${tabName}を追加`, fields, {}, async (data) => {
    try {
      await api('POST', `/api/v1/admin/${currentTab}`, data);
      closeModal();
      toast('追加しました');
      loadData();
    } catch (e) {
      toast(e.message, true);
    }
  });
}

function openEditModal(rowIndex) {
  const row = currentRows.find(r => r._row_index === rowIndex);
  if (!row) return;
  const tabName = TABS.find(t => t.slug === currentTab).name;
  const fields = currentHeaders.filter(h => h !== '_row_index');
  openModal(`${tabName}を編集`, fields, row, async (data) => {
    try {
      await api('PUT', `/api/v1/admin/${currentTab}/${rowIndex}`, data);
      closeModal();
      toast('更新しました');
      loadData();
    } catch (e) {
      toast(e.message, true);
    }
  });
}

async function deleteRow(rowIndex) {
  if (!confirm('この行を削除しますか？')) return;
  try {
    await api('DELETE', `/api/v1/admin/${currentTab}/${rowIndex}`);
    toast('削除しました');
    loadData();
  } catch (e) {
    toast(e.message, true);
  }
}

// --- Cache Reload ---
async function reloadCache() {
  try {
    await api('POST', '/api/v1/reload');
    toast('キャッシュを更新しました');
  } catch (e) {
    toast(e.message, true);
  }
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    closeApiKeyDialog();
  }
});

document.getElementById('apikeyInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveApiKey();
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// --- Init ---
document.getElementById('companySelect').addEventListener('change', loadData);
renderTabs();

if (!getApiKey()) {
  showApiKeyDialog();
} else {
  loadData();
}
</script>
</body>
</html>
